<!DOCTYPE html>
<html lang="en" class="dark">
<head>
 <meta charset="UTF-8">
 <!-- Strict Viewport to prevent iOS zooming and adapt to mobile devices perfectly -->
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
 <meta name="theme-color" content="#18181b">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
 <title>DutyPlanner</title>
 <link rel="manifest" href="./manifest.json">
 
 <script src="https://cdn.tailwindcss.com"></script>
 <script src="https://unpkg.com/lucide@latest"></script>
 <style>
     html, body {
         overscroll-behavior-y: none; /* Prevents pull-to-refresh bounce on mobile */
     }
     ::-webkit-scrollbar { width: 8px; height: 8px; }
     ::-webkit-scrollbar-track { background: #09090b; }
     ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
     ::-webkit-scrollbar-thumb:hover { background: #52525b; }
     .tab-btn.active { background-color: rgba(99, 102, 241, 0.15); color: #a5b4fc; border-right: 3px solid #818cf8; }
     .mobile-tab-btn.active { color: #818cf8; }
     .hide-scroll::-webkit-scrollbar { display: none; }
     
     /* ENHANCED INPUT VISIBILITY & MOBILE TAP TARGETS */
     input[type="text"], input[type="number"], input[type="time"], input[type="month"], select {
         color: #ffffff !important;
         background-color: #18181b !important; 
         border: 2px solid #52525b !important; 
         border-radius: 0.5rem;
         box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4) !important;
         transition: all 0.2s ease-in-out;
     }
     input:hover, select:hover {
         border-color: #a1a1aa !important; 
         background-color: #27272a !important;
     }
     input:focus, select:focus {
         border-color: #818cf8 !important; 
         box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.3), inset 0 2px 4px rgba(0, 0, 0, 0.4) !important;
         background-color: #09090b !important;
         outline: none !important;
     }
     ::placeholder {
         color: #a1a1aa !important; 
         opacity: 1 !important;
     }
     input[type="checkbox"] {
         border: 2px solid #71717a !important;
         background-color: #1f1f22 !important;
         cursor: pointer;
     }
     input[type="checkbox"]:checked {
         border-color: #818cf8 !important;
         background-color: #818cf8 !important;
     }
     .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
 </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-indigo-500/30">

 <div id="app"></div>

 <script>
     // Service Worker Registration for PWA
     if ('serviceWorker' in navigator) {
         window.addEventListener('load', () => {
             navigator.serviceWorker.register('./sw.js').catch(err => {
                 console.log('ServiceWorker registration failed: ', err);
             });
         });
     }

     // REPLACE WITH YOUR ACTUAL WEB APP DEPLOYMENT URL
     const API_URL = "https://script.google.com/macros/s/AKfycbzBf4TJr_ZBPLZJEx4msOy-zXqSZkUU621FO7q3TrC0ml3ZKACComdBPLZ2ahw032v2/exec";

     // ==============================================
     // FRAMEWORK / STATE MANAGER
     // ==============================================
     const UI = {
         state: {
             activeTab: 'setup',
             loading: false,
             lastMonth: '',
             searchQuery: '',
             selectedPersonId: null,
             editingRoleId: null,
             viewMode: 'both',
             activeModal: null,
             data: { seniorities: [], personnel: [], roles: [], shifts: [], tags: [], schedule: [] }
         },
         
         init() {
             this.dispatch('sync');
         },

         async dispatch(action, payload = {}) {
             this.state.loading = true;
             this.render();
             
             try {
                 const res = await fetch(API_URL, {
                     method: 'POST',
                     headers: { 'Content-Type': 'text/plain' },
                     body: JSON.stringify({ action, ...payload })
                 });
                 const json = await res.json();
                 
                 if (json.status === 'success') {
                     this.state.data = json.data;
                     if (json.message) this.showToast(json.message, 'success');
                     
                     // Handle state cleanup based on actions
                     if (action === 'deletePerson' && payload.id === this.state.selectedPersonId) {
                         this.state.selectedPersonId = null;
                     }
                     if (action === 'updateRole' || action === 'addRole') {
                         this.state.editingRoleId = null;
                     }
                     if (action === 'deleteRole' && payload.id === this.state.editingRoleId) {
                         this.state.editingRoleId = null;
                     }
                 } else {
                     this.showToast(json.message || "An error occurred", 'error');
                 }
             } catch (e) {
                 this.showToast("Network Error: Could not connect to database.", 'error');
             }
             
             this.state.loading = false;
             this.render();
         },

         showToast(msg, type) {
             const existing = document.getElementById('toast-container');
             if (existing) existing.remove();
             
             const isErr = type === 'error';
             const toastHtml = `
             <div id="toast-container" class="fixed top-8 left-1/2 -translate-x-1/2 md:top-auto md:bottom-8 md:left-auto md:right-8 md:translate-x-0 z-[110] animate-in slide-in-from-top-8 md:slide-in-from-bottom-8 fade-in duration-300 w-[90%] md:w-auto max-w-sm">
                 <div class="${isErr ? 'bg-red-500 text-white' : 'bg-white text-zinc-900'} px-5 py-3.5 rounded-xl shadow-2xl font-bold text-sm flex items-center gap-3 border ${isErr ? 'border-red-400' : 'border-zinc-200'}">
                     <i data-lucide="${isErr ? 'alert-octagon' : 'check-circle'}" class="w-5 h-5 shrink-0 ${isErr ? 'text-white' : 'text-emerald-500'}"></i>
                     <span class="flex-1">${msg}</span>
                 </div>
             </div>
             `;
             document.body.insertAdjacentHTML('beforeend', toastHtml);
             if (window.lucide) window.lucide.createIcons();
             
             setTimeout(() => {
                 const t = document.getElementById('toast-container');
                 if (t) {
                     t.style.opacity = '0';
                     t.style.transition = 'opacity 0.3s ease';
                     setTimeout(() => t.remove(), 300);
                 }
             }, 3000);
         },
         
         render() {
             const activeEl = document.activeElement;
             const activeId = activeEl ? activeEl.id : null;
             let cursorStart = null;
             let cursorEnd = null;

             if (activeId && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
                 try {
                     cursorStart = activeEl.selectionStart;
                     cursorEnd = activeEl.selectionEnd;
                 } catch (e) {} 
             }

             document.getElementById('app').innerHTML = AppTemplate(this.state);
             if (window.lucide) window.lucide.createIcons();

             if (this.state.activeTab === 'setup' && !this.state.editingRoleId) {
                 if (typeof window.renderShiftInputs === 'function') {
                     window.renderShiftInputs();
                 }
             }

             if (activeId) {
                 const restoredEl = document.getElementById(activeId);
                 if (restoredEl) {
                     restoredEl.focus();
                     if (cursorStart !== null && cursorEnd !== null) {
                         try { restoredEl.setSelectionRange(cursorStart, cursorEnd); } catch (e) {}
                     }
                 }
             }
         }
     };

     function getSeniorityName(id, state) {
         const s = state.data.seniorities.find(x => x.id === id);
         return s ? s.name : 'Unassigned';
     }

     // ==============================================
     // COMPONENTS
     // ==============================================
     function AppTemplate(state) {
         return `
         <div class="flex h-[100dvh] overflow-hidden relative bg-zinc-950">
             ${Sidebar(state)}
             <main class="flex-1 overflow-y-auto pb-20 md:pb-0 w-full relative">
                 <div class="p-4 sm:p-6 md:p-8 max-w-6xl mx-auto">
                     ${state.activeTab === 'setup' ? SetupView(state) : ''}
                     ${state.activeTab === 'manage' ? ManageView(state) : ''}
                     ${state.activeTab === 'roster' ? RosterView(state) : ''}
                     ${state.activeTab === 'calc' ? ManpowerCalculatorView(state) : ''}
                     ${state.activeTab === 'settings' ? AdvancedSettingsView(state) : ''}
                 </div>
             </main>
             ${MobileNav(state)}
         </div>
         ${state.loading ? Loader() : ''}
         ${InfoModal(state)}
         `;
     }

     function Sidebar(state) {
         const tabs = [
             { id: 'setup', name: 'Topology & Setup', icon: 'database' },
             { id: 'manage', name: 'Personnel & Assignments', icon: 'users' },
             { id: 'roster', name: 'Roster Engine', icon: 'calendar-days' },
             { id: 'calc', name: 'Manpower Calculator', icon: 'calculator' },
             { id: 'settings', name: 'Advanced Settings', icon: 'settings' }
         ];
         return `
         <aside class="hidden md:flex w-72 bg-zinc-900 border-r border-zinc-800 flex-col z-10 shadow-2xl shrink-0">
             <div class="p-6 border-b border-zinc-800 flex items-center gap-3">
                 <div class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center border border-indigo-500/50 text-indigo-400 shrink-0">
                     <i data-lucide="shield-check" class="w-5 h-5"></i>
                 </div>
                 <div>
                     <h1 class="text-lg font-bold text-white leading-tight">DutyPlanner</h1>
                 </div>
             </div>
             <nav class="flex-1 p-4 space-y-2">
                 ${tabs.map(t => `
                     <button onclick="window.switchTab('${t.id}')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all duration-200 ${state.activeTab === t.id ? 'active' : (t.id === 'settings' ? 'text-zinc-500 hover:bg-zinc-800/50 hover:text-white' : 'text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200')} border-r-2 border-transparent">
                         <i data-lucide="${t.icon}" class="w-5 h-5"></i>
                         ${t.name}
                     </button>
                 `).join('')}
             </nav>
         </aside>
         `;
     }
     
     function MobileNav(state) {
         const tabs = [
             { id: 'setup', name: 'Setup', icon: 'database' },
             { id: 'manage', name: 'Personnel', icon: 'users' },
             { id: 'roster', name: 'Roster', icon: 'calendar-days' },
             { id: 'calc', name: 'Calculator', icon: 'calculator' },
             { id: 'settings', name: 'Settings', icon: 'settings' }
         ];
         
         return `
         <div class="md:hidden fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 z-40 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
             <div class="flex justify-around items-center h-16">
                 ${tabs.map(t => `
                     <button onclick="window.switchTab('${t.id}')" class="mobile-tab-btn flex-1 flex flex-col items-center justify-center gap-1 transition-colors ${state.activeTab === t.id ? 'active text-indigo-400' : 'text-zinc-500'}">
                         <i data-lucide="${t.icon}" class="w-5 h-5 ${state.activeTab === t.id ? 'drop-shadow-[0_0_8px_rgba(99,102,241,0.8)]' : ''}"></i>
                         <span class="text-[10px] font-bold tracking-wide">${t.name}</span>
                     </button>
                 `).join('')}
             </div>
         </div>
         `;
     }
     
     function InfoModal(state) {
         if (!state.activeModal) return '';
         const modalData = {
             'onSite': { 
                 title: 'On-Site Demand', 
                 htmlContent: `
                    <div class="space-y-5">
                        <p class="text-zinc-300">Calculates the total weekly hours required to man all active on-site shifts based on shift duration, weekly schedule, and personnel count.</p>
                        <div class="bg-[#18181b] border border-zinc-700 rounded-xl overflow-hidden shadow-inner">
                            <div class="bg-indigo-500/10 px-4 py-2 border-b border-zinc-700/50 flex items-center gap-2">
                                <span class="bg-indigo-500 text-white px-1.5 py-0.5 rounded text-[10px] font-black uppercase tracking-widest shadow-sm">Example</span>
                                <span class="text-indigo-200 text-xs font-bold uppercase tracking-wider">12-Hr Shift (24/7 Role, 2 Pax)</span>
                            </div>
                            <ul class="p-4 space-y-2 text-sm text-zinc-300 font-mono">
                                <li class="flex justify-between items-center"><span class="text-zinc-400">Shift Duration:</span> <span>12 hours</span></li>
                                <li class="flex justify-between items-center"><span class="text-zinc-400">Days per week:</span> <span>× 7 days</span></li>
                                <li class="flex justify-between items-center"><span class="text-zinc-400">Headcount/shift:</span> <span>× 2 pax</span></li>
                                <li class="border-t border-zinc-700/50 pt-2 flex justify-between items-center font-bold text-indigo-300 text-base mt-2"><span>Total Demand:</span> <span>168 hrs/wk</span></li>
                            </ul>
                        </div>
                    </div>
                 `
             },
             'standby': { 
                 title: 'Standby Buffers', 
                 htmlContent: `
                    <div class="space-y-5">
                        <p class="text-zinc-300">Standby roles do not accumulate rigid schedule hours until physically activated. To realistically account for this in manpower planning, the mathematical framework applies a statistical buffer.</p>
                        <div class="bg-[#18181b] border border-zinc-700 rounded-xl overflow-hidden shadow-inner">
                            <div class="bg-orange-500/10 px-4 py-2 border-b border-zinc-700/50 flex items-center gap-2">
                                <span class="bg-orange-500 text-white px-1.5 py-0.5 rounded text-[10px] font-black uppercase tracking-widest shadow-sm">Model Assumptions</span>
                            </div>
                            <ul class="p-4 space-y-2 text-sm text-zinc-300 font-mono">
                                <li class="flex justify-between items-center"><span class="text-zinc-400">Est. Activations:</span> <span>2 per month</span></li>
                                <li class="flex justify-between items-center"><span class="text-zinc-400">Time / Activation:</span> <span>× 24 hours</span></li>
                                <li class="flex justify-between items-center"><span class="text-zinc-400">Monthly Load:</span> <span>= 48 hours</span></li>
                                <li class="border-t border-zinc-700/50 pt-2 flex justify-between items-center font-bold text-orange-300 text-base mt-2"><span>Weekly Equivalent:</span> <span>~12 hrs/wk</span></li>
                            </ul>
                        </div>
                        <p class="text-xs text-zinc-500 italic text-center">*Pro-rated downwards for roles that are not 24/7 operations.</p>
                    </div>
                 `
             },
             'baseReq': { 
                 title: 'Base Req. Headcount', 
                 htmlContent: `
                    <div class="space-y-5">
                        <p class="text-zinc-300">The raw number of personnel needed to safely cover the total operational working hours (On-Site + Standby), divided by a single person's capacity.</p>
                        <div class="bg-[#18181b] border border-zinc-700 rounded-xl p-5 shadow-inner flex flex-col items-center">
                            <div class="w-full flex justify-between items-center bg-zinc-900 border border-zinc-700 px-4 py-3 rounded-lg">
                                <span class="text-zinc-400 text-xs font-bold uppercase tracking-widest">Total Workload</span>
                                <span class="font-black text-white text-xl">120 hrs/wk</span>
                            </div>
                            <div class="my-3 border border-zinc-700 rounded-full w-8 h-8 flex items-center justify-center bg-zinc-800 shadow-md">
                                <i data-lucide="divide" class="w-4 h-4 text-zinc-400"></i>
                            </div>
                            <div class="w-full flex justify-between items-center bg-indigo-500/10 border border-indigo-500/30 px-4 py-3 rounded-lg">
                                <span class="text-indigo-300 text-xs font-bold uppercase tracking-widest">Net Duty Capacity</span>
                                <span class="font-black text-indigo-300 text-xl">15 hrs/person</span>
                            </div>
                            <div class="w-full border-t border-zinc-700 mt-5 pt-4 flex justify-between items-center">
                                <span class="text-white font-bold tracking-wide">Base Headcount:</span>
                                <span class="font-black text-white text-2xl">8 Pax</span>
                            </div>
                        </div>
                    </div>
                 `
             },
             'reserve': { 
                 title: 'Dedicated Reserves', 
                 htmlContent: `
                    <div class="space-y-5">
                        <p class="text-zinc-300">Reserves require physical availability but do not accrue pure working hours unless activated. Therefore, they are mathematically calculated by <strong>shift blocks</strong>, not continuous hours.</p>
                        <div class="bg-[#18181b] border border-zinc-700 rounded-xl overflow-hidden shadow-inner">
                            <div class="bg-amber-500/10 px-4 py-2 border-b border-zinc-700/50 flex items-center gap-2">
                                <span class="bg-amber-500 text-zinc-900 px-1.5 py-0.5 rounded text-[10px] font-black uppercase tracking-widest shadow-sm">Formula</span>
                                <span class="text-amber-300 text-xs font-bold uppercase tracking-wider">Based on 1 Shift/Day (7 days)</span>
                            </div>
                            <ul class="p-4 space-y-3 text-sm text-zinc-300 font-mono">
                                <li class="flex flex-col gap-1">
                                    <span class="text-zinc-400">Total Reserve Shifts Required:</span> 
                                    <span class="font-bold text-white text-lg">7 shifts/week</span>
                                </li>
                                <li class="flex flex-col gap-1">
                                    <span class="text-zinc-400">Single Person Shift Capacity:</span> 
                                    <span class="text-[10px] uppercase font-bold text-zinc-500">(192 working days ÷ 52.14 weeks)</span>
                                    <span class="font-bold text-amber-300 text-lg">~3.682 shifts/week</span>
                                </li>
                                <li class="border-t border-zinc-700/50 pt-3 flex justify-between items-center font-bold text-white mt-2">
                                    <span>Headcount (7 ÷ 3.682):</span> 
                                    <span class="text-xl flex flex-col items-end leading-tight">2 Pax <span class="text-[10px] uppercase font-bold text-zinc-500">(Rounded Up)</span></span>
                                </li>
                            </ul>
                        </div>
                    </div>
                 `
             },
             'totalReq': {
                 title: 'Total Headcount Needed',
                 htmlContent: `
                    <div class="space-y-5">
                        <p class="text-zinc-300">The absolute final headcount required for this seniority tier, derived by mathematically merging the active operational pool and the dedicated reserve pool.</p>
                        <div class="bg-gradient-to-br from-indigo-500/10 to-transparent border border-indigo-500/30 rounded-xl p-5 shadow-inner">
                            <div class="flex justify-between items-center font-mono text-lg mb-3">
                                <span class="text-indigo-300 font-bold flex items-center gap-2"><i data-lucide="shield" class="w-4 h-4"></i> Base Headcount</span>
                                <span class="text-white font-bold bg-zinc-900 px-3 py-1 rounded shadow-inner">8</span>
                            </div>
                            <div class="flex justify-between items-center font-mono text-lg mb-5">
                                <span class="text-amber-300 font-bold flex items-center gap-2"><i data-lucide="life-buoy" class="w-4 h-4"></i> Dedicated Reserves</span>
                                <span class="text-white font-bold bg-zinc-900 px-3 py-1 rounded shadow-inner">+ 2</span>
                            </div>
                            <div class="border-t border-indigo-500/50 pt-4 flex flex-col items-center justify-center bg-indigo-500/20 rounded-lg p-4 shadow-lg border border-indigo-400/30">
                                <span class="text-indigo-200 font-bold text-xs uppercase tracking-widest mb-1">Total Organization Need</span>
                                <span class="text-white font-black text-5xl">10</span>
                            </div>
                        </div>
                    </div>
                 `
             }
         };
         
         const data = modalData[state.activeModal];
         if (!data) return '';
         
         return `
         <div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 pb-20 md:pb-6">
             <div class="absolute inset-0 bg-zinc-950/85 backdrop-blur-sm transition-opacity" onclick="window.closeModal()"></div>
             <div class="relative bg-zinc-900 border border-zinc-700 rounded-2xl shadow-[0_0_40px_rgba(0,0,0,0.8)] w-full max-w-md overflow-hidden animate-in zoom-in-95 fade-in duration-200 flex flex-col max-h-full">
                 <div class="p-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-800/80">
                     <h3 class="text-lg font-black text-white flex items-center gap-2 tracking-wide uppercase"><i data-lucide="info" class="w-5 h-5 text-indigo-400"></i> ${data.title}</h3>
                     <button onclick="window.closeModal()" class="text-zinc-400 hover:text-white bg-zinc-900 hover:bg-zinc-700 rounded-lg p-1.5 transition-colors border border-zinc-700 outline-none"><i data-lucide="x" class="w-4 h-4"></i></button>
                 </div>
                 <div class="p-5 md:p-6 overflow-y-auto flex-1 hide-scroll">
                     ${data.htmlContent}
                 </div>
                 <div class="p-4 border-t border-zinc-800 bg-zinc-950/80 flex justify-end">
                     <button onclick="window.closeModal()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-lg font-bold transition-colors text-sm shadow-md outline-none uppercase tracking-wider">Acknowledge</button>
                 </div>
             </div>
         </div>
         `;
     }

     function AdvancedSettingsView(state) {
         const sortedSen = [...state.data.seniorities].sort((a,b) => a.order - b.order);

         return `
         <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 w-full max-w-4xl">
             <div class="mb-4">
                 <h2 class="text-2xl font-bold text-white tracking-wide">Advanced Settings</h2>
                 <p class="text-zinc-400 text-sm mt-1">Configure global application data and execute database operations.</p>
             </div>

             <!-- Seniority Tiers Manager -->
             <div class="bg-zinc-900 border border-zinc-700 rounded-xl p-4 sm:p-6 shadow-xl mt-6 overflow-hidden">
                 <h3 class="text-lg font-bold text-white mb-2 flex items-center gap-2"><i data-lucide="bar-chart" class="w-5 h-5 text-indigo-400"></i> Manage Seniority Tiers</h3>
                 <p class="text-sm text-zinc-400 mb-6 leading-relaxed">Define the levels of seniority in your organization. Changes here automatically update personnel records, shift requirements, and the manpower calculator.</p>
                 
                 <div class="space-y-4 mb-6">
                     ${sortedSen.map(sen => `
                         <div class="flex flex-wrap sm:flex-nowrap items-center gap-3 sm:gap-4 bg-zinc-950 p-3 sm:p-4 rounded-lg border border-zinc-600">
                             <div class="flex flex-col w-20 shrink-0">
                                 <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold mb-1">Order</label>
                                 <input type="number" id="senOrder_${sen.id}" value="${sen.order}" class="w-full px-3 py-2 text-sm outline-none text-center">
                             </div>
                             <div class="flex-1 flex flex-col min-w-[120px]">
                                 <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold mb-1">Tier Name</label>
                                 <input type="text" id="senName_${sen.id}" value="${sen.name}" class="w-full px-3 py-2 text-sm outline-none">
                             </div>
                             <div class="flex items-end gap-2 mt-2 sm:mt-4 w-full sm:w-auto justify-end">
                                 <button onclick="window.handleUpdateSeniorityTier('${sen.id}')" class="flex-1 sm:flex-none bg-zinc-700 hover:bg-zinc-600 text-white border border-zinc-500 rounded px-4 py-2 sm:py-1.5 text-sm font-bold transition-colors shadow">Update</button>
                                 <button onclick="window.handleDeleteSeniorityTier('${sen.id}')" class="bg-red-500/10 text-red-400 hover:bg-red-500/20 border border-red-500/20 rounded p-2 sm:py-1.5 transition-colors" title="Delete Tier"><i data-lucide="trash-2" class="w-5 h-5 sm:w-4 sm:h-4"></i></button>
                             </div>
                         </div>
                     `).join('')}
                 </div>

                 <div class="pt-4 border-t border-zinc-700 flex flex-col sm:flex-row gap-4 sm:items-end bg-zinc-900/50">
                     <div class="flex-1">
                         <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold mb-1 block">New Tier Name</label>
                         <input type="text" id="newSenName" placeholder="e.g. Trainee" class="w-full px-4 py-2.5 sm:py-2 text-sm outline-none">
                     </div>

     function ManpowerCalculatorView(state) {
         const sortedSen = [...state.data.seniorities].sort((a,b) => a.order - b.order);
         const existingCount = {};
         sortedSen.forEach(s => existingCount[s.id] = 0);

         state.data.personnel.forEach(p => {
             if(p.seniority && existingCount[p.seniority] !== undefined) existingCount[p.seniority]++;
         });

         const DUTY_HOURS_CAPACITY = 15; 
         const EFFECTIVE_SHIFTS_PER_WEEK = 192 / 52.14; // ~3.682 available shifts per week per person
         
         let workings = {};
         sortedSen.forEach(s => workings[s.id] = { onSiteHrs: 0, standbyHrs: 0, totalHrs: 0, reserveShifts: 0, reserveHeadcount: 0, requiredCount: 0 });

         state.data.roles.forEach(r => {
             let daysPerWeek = (r.is247 === true || r.is247 === 'TRUE') ? 7 : (r.days.split(',').filter(x=>x).length);
             let roleShifts = state.data.shifts.filter(s => s.roleId === r.id);
             
             roleShifts.forEach(s => {
                 let st = new Date(`2000-01-01T${s.start || '00:00'}`);
                 let et = new Date(`2000-01-01T${s.end || '00:00'}`);
                 if(et <= st) et.setDate(et.getDate() + 1);
                 let hrs = (et - st) / 3600000;

                 let shiftReqs = {};
                 try{ shiftReqs = JSON.parse(s.reqs); }catch(e){}

                 sortedSen.forEach(sen => {
                     let count = parseInt(shiftReqs[sen.id]) || 0;
                     if(count > 0) {
                         if (r.type === 'Standby') {

                     }
                 });
             });

         document.querySelectorAll('.role-concurrent-cb:checked').forEach(cb => concurrentRoles.push(cb.value));
         
         const sortedSen = [...UI.state.data.seniorities].sort((a,b) => a.order - b.order);
         const num = parseInt(document.getElementById('inpNumShifts').value) || 1;
         const shifts = [];
         
         for(let i=1; i<=num; i++) {
             const sn = document.getElementById(`sName_${i}`).value.trim();
             const st = document.getElementById(`sStart_${i}`).value;
             const se = document.getElementById(`sEnd_${i}`).value;
             
             const shiftReqs = {};
             sortedSen.forEach(sen => {
                 const reqEl = document.getElementById(`sReq_${sen.id}_${i}`);
                 if(reqEl) { shiftReqs[sen.id] = parseInt(reqEl.value) || 0; }
             });

             if(!sn || !st || !se) return UI.showToast("Missing parameters in shift inputs.", "error");
             
             shifts.push({ 
                 name: sn, 
                 start: st, 
                 end: se,
                 reqs: shiftReqs
             });
         }

         if(!roleName) return UI.showToast("Role name is required.", "error");
         if(days.length === 0) return UI.showToast("Select at least one day constraint.", "error");

         const payload = { roleName, roleType, is247, daysOfWeek: days, concurrentRoles, shifts };

         if(UI.state.editingRoleId) {
             UI.dispatch('updateRole', { id: UI.state.editingRoleId, ...payload });
         } else {
             UI.dispatch('addRole', payload);
         }
     };

     window.handleAssign = (personId) => {
         const roleId = document.getElementById('assignRoleSelect').value;
         if(!roleId) return UI.showToast("Select a role to grant.", "error");
         UI.dispatch('tagPerson', { personId, roleId });
     };

     window.handleGenerate = () => {
         const ym = document.getElementById('inpMonth').value;
         if(!ym) return UI.showToast("Select a valid month to execute engine.", "error");
         const [year, month] = ym.split('-');
         
         if(UI.state.data.roles.length === 0 || UI.state.data.personnel.length === 0) {
             return UI.showToast("Engine halted: Missing personnel or roles.", "error");
         }
         
         UI.dispatch('generateSchedule', { year: parseInt(year), month: parseInt(month) });
     };

     // Bootstrap App
     window.onload = () => UI.init();

 </script>
</body>
</html>
