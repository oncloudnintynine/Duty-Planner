<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DutyPlanner PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .tab-btn.active { background-color: rgba(99, 102, 241, 0.1); color: #818cf8; border-right: 3px solid #818cf8; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-indigo-500/30">

    <div id="app"></div>

    <script>
        // REPLACE WITH YOUR ACTUAL WEB APP DEPLOYMENT URL
        const API_URL = "https://script.google.com/macros/s/AKfycbzBf4TJr_ZBPLZJEx4msOy-zXqSZkUU621FO7q3TrC0ml3ZKACComdBPLZ2ahw032v2/exec";

        // ==============================================
        // FRAMEWORK / STATE MANAGER
        // ==============================================
        const UI = {
            state: {
                activeTab: 'setup',
                loading: false,
                lastMonth: '',
                data: { personnel: [], roles: [], shifts: [], tags: [], schedule: [] },
                toast: null
            },
            
            init() {
                this.dispatch('sync');
            },

            async dispatch(action, payload = {}) {
                this.state.loading = true;
                this.render();
                
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action, ...payload })
                    });
                    const json = await res.json();
                    
                    if (json.status === 'success') {
                        this.state.data = json.data;
                        if (json.message) this.showToast(json.message, 'success');
                    } else {
                        this.showToast(json.message || "An error occurred", 'error');
                    }
                } catch (e) {
                    this.showToast("Network Error: Could not connect to database.", 'error');
                }
                
                this.state.loading = false;
                this.render();
                
                // Re-hydrate local DOM dependencies after render
                if(this.state.activeTab === 'setup') window.renderShiftInputs();
            },

            showToast(msg, type) {
                this.state.toast = { msg, type };
                this.render();
                setTimeout(() => { this.state.toast = null; this.render(); }, 3000);
            },
            
            render() {
                document.getElementById('app').innerHTML = AppTemplate(this.state);
                lucide.createIcons();
            }
        };

        // ==============================================
        // COMPONENTS
        // ==============================================
        function AppTemplate(state) {
            return `
            <div class="flex h-screen overflow-hidden">
                ${Sidebar(state)}
                <main class="flex-1 overflow-y-auto bg-zinc-950 p-8">
                    <div class="max-w-6xl mx-auto pb-12">
                        ${state.activeTab === 'setup' ? SetupView(state) : ''}
                        ${state.activeTab === 'manage' ? ManageView(state) : ''}
                        ${state.activeTab === 'roster' ? RosterView(state) : ''}
                    </div>
                </main>
            </div>
            ${state.loading ? Loader() : ''}
            ${state.toast ? Toast(state.toast) : ''}
            `;
        }

        function Sidebar(state) {
            const tabs = [
                { id: 'setup', name: 'Base Setup', icon: 'database' },
                { id: 'manage', name: 'Role Assignments', icon: 'users' },
                { id: 'roster', name: 'Roster Engine', icon: 'calendar-days' }
            ];
            return `
            <aside class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col z-10 shadow-2xl">
                <div class="p-6 border-b border-zinc-800 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center border border-indigo-500/50 text-indigo-400">
                        <i data-lucide="shield-check" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white leading-tight">DutyPlanner</h1>
                        <p class="text-xs text-zinc-500">PRO EDITION</p>
                    </div>
                </div>
                <nav class="flex-1 p-4 space-y-2">
                    ${tabs.map(t => `
                        <button onclick="window.switchTab('${t.id}')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all duration-200 ${state.activeTab === t.id ? 'active' : 'text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200'} border-r-2 border-transparent">
                            <i data-lucide="${t.icon}" class="w-5 h-5"></i>
                            ${t.name}
                        </button>
                    `).join('')}
                </nav>
            </aside>
            `;
        }

        function SetupView(state) {
            return `
            <div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="mb-2">
                    <h2 class="text-2xl font-bold text-white">Database Setup</h2>
                    <p class="text-zinc-400 text-sm mt-1">Configure your personnel list and define daily role logic.</p>
                </div>
                
                <!-- Personnel Section -->
                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-xl">
                    <h3 class="text-lg font-semibold text-white mb-5 flex items-center gap-2"><i data-lucide="user-plus" class="w-5 h-5 text-indigo-400"></i> Personnel Registry</h3>
                    <div class="grid grid-cols-2 gap-8">
                        <div>
                            <label class="block text-sm font-medium text-zinc-400 mb-2">Add Individual</label>
                            <div class="flex gap-3">
                                <input type="text" id="inpPersonName" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2 text-sm outline-none focus:border-indigo-500 transition-colors" placeholder="e.g. John Doe">
                                <button onclick="window.handleAddPerson()" class="bg-zinc-100 text-zinc-900 px-5 py-2 rounded-lg font-medium hover:bg-white transition-colors text-sm shadow">Add</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-zinc-400 mb-2">Bulk Import List</label>
                            <textarea id="inpBulkPerson" rows="3" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2 text-sm outline-none focus:border-indigo-500 transition-colors mb-3 resize-none" placeholder="Paste names separated by commas or new lines..."></textarea>
                            <button onclick="window.handleBulkImport()" class="w-full bg-zinc-800 text-white px-4 py-2 rounded-lg font-medium hover:bg-zinc-700 transition-colors text-sm border border-zinc-700">Import Batch</button>
                        </div>
                    </div>
                </div>

                <!-- Role Section -->
                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-xl">
                    <h3 class="text-lg font-semibold text-white mb-5 flex items-center gap-2"><i data-lucide="briefcase" class="w-5 h-5 text-indigo-400"></i> Role & Shift Logic</h3>
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-2">Role Name</label>
                                <input type="text" id="inpRoleName" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2 text-sm outline-none focus:border-indigo-500" placeholder="e.g. Area Commander">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-2">Weekly Pattern</label>
                                <label class="flex items-center gap-3 bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2 cursor-pointer hover:border-zinc-700 transition-colors h-[38px]">
                                    <input type="checkbox" id="inpIs247" onchange="window.toggleDays(this.checked)" class="w-4 h-4 rounded border-zinc-700 bg-zinc-900">
                                    <span class="text-sm">Runs 24/7 (Mon-Sun)</span>
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-zinc-400 mb-3">Target Days (if not 24/7)</label>
                            <div class="flex flex-wrap gap-2">
                                ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(day => `
                                    <label class="flex items-center gap-2 bg-zinc-950 border border-zinc-800 px-4 py-2 rounded-md cursor-pointer hover:border-zinc-700">
                                        <input type="checkbox" value="${day}" class="role-day-cb w-4 h-4 rounded bg-zinc-900">
                                        <span class="text-sm font-medium text-zinc-300">${day}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>

                        <div class="bg-zinc-950/50 rounded-lg p-5 border border-zinc-800/50 mt-6">
                            <div class="flex items-center justify-between mb-4 pb-4 border-b border-zinc-800/50">
                                <div>
                                    <label class="block text-sm font-medium text-zinc-200">Shift Topology</label>
                                    <p class="text-xs text-zinc-500">Define how many shifts are needed per active day.</p>
                                </div>
                                <select id="inpNumShifts" onchange="window.renderShiftInputs()" class="bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2 text-sm outline-none w-32 shadow-inner">
                                    <option value="1">1 Shift</option>
                                    <option value="2">2 Shifts</option>
                                    <option value="3">3 Shifts</option>
                                    <option value="4">4 Shifts</option>
                                    <option value="5">5 Shifts</option>
                                </select>
                            </div>
                            <div id="shiftRowsContainer" class="space-y-3">
                                <!-- JS Injected Shifts -->
                            </div>
                        </div>

                        <div class="pt-2">
                            <button onclick="window.handleAddRole()" class="w-full bg-zinc-100 text-zinc-900 px-4 py-3 rounded-lg font-bold hover:bg-white transition-all text-sm shadow-lg shadow-zinc-200/5">Add Role to Database</button>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function ManageView(state) {
            return `
            <div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="mb-2">
                    <h2 class="text-2xl font-bold text-white">Role Assignments</h2>
                    <p class="text-zinc-400 text-sm mt-1">Manage personnel capabilities and remove obsolete records.</p>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-xl">
                   <h3 class="text-lg font-semibold text-white mb-5 flex items-center gap-2"><i data-lucide="link" class="w-5 h-5 text-indigo-400"></i> Map Person to Role</h3>
                   <div class="flex gap-4">
                       <select id="selPerson" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 outline-none text-sm text-zinc-300">
                           <option value="">-- Select Personnel --</option>
                           ${state.data.personnel.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
                       </select>
                       <select id="selRole" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 outline-none text-sm text-zinc-300">
                           <option value="">-- Select Target Role --</option>
                           ${state.data.roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
                       </select>
                       <button onclick="window.handleAssign()" class="bg-indigo-600 text-white px-8 py-2.5 rounded-lg font-medium hover:bg-indigo-500 transition-colors shadow">Authorize</button>
                   </div>
                </div>

                <!-- Split view tables -->
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl flex flex-col h-[400px] shadow-xl">
                        <div class="p-4 border-b border-zinc-800 bg-zinc-950 rounded-t-xl flex justify-between items-center">
                            <h3 class="font-semibold text-zinc-300 text-sm tracking-wide uppercase">Personnel Database</h3>
                            <span class="text-xs bg-zinc-800 px-2 py-0.5 rounded text-zinc-400">${state.data.personnel.length}</span>
                        </div>
                        <div class="flex-1 overflow-y-auto">
                            <table class="w-full text-left text-sm text-zinc-400">
                                <tbody class="divide-y divide-zinc-800/50">
                                    ${state.data.personnel.map(p => `
                                    <tr class="hover:bg-zinc-800/20 group transition-colors">
                                        <td class="px-5 py-3 font-medium text-zinc-200">${p.name}</td>
                                        <td class="px-5 py-3 text-right">
                                            <button onclick="UI.dispatch('deletePerson', {id: '${p.id}'})" class="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-red-400 transition-all p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </td>
                                    </tr>
                                    `).join('') || `<tr><td colspan="2" class="px-5 py-8 text-center text-zinc-600 text-xs italic">No personnel in database</td></tr>`}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl flex flex-col h-[400px] shadow-xl">
                        <div class="p-4 border-b border-zinc-800 bg-zinc-950 rounded-t-xl flex justify-between items-center">
                            <h3 class="font-semibold text-zinc-300 text-sm tracking-wide uppercase">Defined Roles</h3>
                            <span class="text-xs bg-zinc-800 px-2 py-0.5 rounded text-zinc-400">${state.data.roles.length}</span>
                        </div>
                        <div class="flex-1 overflow-y-auto">
                            <table class="w-full text-left text-sm text-zinc-400">
                                <tbody class="divide-y divide-zinc-800/50">
                                    ${state.data.roles.map(r => `
                                    <tr class="hover:bg-zinc-800/20 group transition-colors">
                                        <td class="px-5 py-3">
                                            <div class="font-medium text-zinc-200">${r.name}</div>
                                            <div class="text-xs text-zinc-500 mt-0.5">${r.days}</div>
                                        </td>
                                        <td class="px-5 py-3 text-right">
                                            <button onclick="UI.dispatch('deleteRole', {id: '${r.id}'})" class="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-red-400 transition-all p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </td>
                                    </tr>
                                    `).join('') || `<tr><td colspan="2" class="px-5 py-8 text-center text-zinc-600 text-xs italic">No roles established</td></tr>`}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden shadow-xl mt-6">
                    <div class="p-4 border-b border-zinc-800 bg-zinc-950 flex justify-between items-center">
                        <h3 class="font-semibold text-zinc-300 text-sm tracking-wide uppercase">Active Assignments Registry</h3>
                        <span class="text-xs bg-zinc-800 px-2 py-0.5 rounded text-zinc-400">${state.data.tags.length} Mapping(s)</span>
                    </div>
                    <div class="max-h-[300px] overflow-y-auto">
                        <table class="w-full text-left text-sm text-zinc-400">
                            <thead class="bg-zinc-900/50 text-zinc-500 text-xs uppercase sticky top-0 backdrop-blur-sm">
                                <tr><th class="px-5 py-3">Personnel</th><th class="px-5 py-3">Assigned Role Capable</th><th class="px-5 py-3 text-right">Action</th></tr>
                            </thead>
                            <tbody class="divide-y divide-zinc-800/50">
                                ${state.data.tags.map(t => {
                                    const p = state.data.personnel.find(x => x.id === t.personId)?.name || '<span class="text-red-400 line-through">Deleted</span>';
                                    const r = state.data.roles.find(x => x.id === t.roleId)?.name || '<span class="text-red-400 line-through">Deleted</span>';
                                    return `
                                    <tr class="hover:bg-zinc-800/20 transition-colors">
                                        <td class="px-5 py-3 font-medium text-zinc-300">${p}</td>
                                        <td class="px-5 py-3">
                                            <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2.5 py-1 rounded text-xs font-semibold tracking-wide">${r}</span>
                                        </td>
                                        <td class="px-5 py-3 text-right">
                                            <button onclick="UI.dispatch('deleteTag', {id: '${t.id}'})" class="text-zinc-500 hover:text-red-400 transition-colors"><i data-lucide="x-circle" class="w-4 h-4"></i></button>
                                        </td>
                                    </tr>
                                    `;
                                }).join('') || `<tr><td colspan="3" class="px-5 py-12 text-center text-zinc-600 text-sm italic">No assignments configured yet.</td></tr>`}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            `;
        }

        function RosterView(state) {
            const ym = document.getElementById('inpMonth')?.value || state.lastMonth || "";
            let scheduleRows = [];
            if(ym) {
                scheduleRows = state.data.schedule.filter(s => String(s.yearMonth).startsWith(ym));
            }

            const formatTime = (isoString) => {
               try { 
                  const d = new Date(isoString); 
                  if(!isNaN(d)) return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false}); 
               } catch(e) {}
               return isoString;
            };

            const formatDate = (isoString) => {
               try { 
                  const d = new Date(isoString); 
                  if(!isNaN(d)) return d.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'}); 
               } catch(e) {}
               return isoString;
            };

            return `
            <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="mb-4">
                    <h2 class="text-2xl font-bold text-white">Heuristic Roster Engine</h2>
                    <p class="text-zinc-400 text-sm mt-1 flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4 text-indigo-400"></i> Engine enforces strict 11-hour rest periods and prioritizes hour balance.
                    </p>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-xl flex items-end gap-6">
                    <div class="flex-1 max-w-sm">
                        <label class="block text-sm font-medium text-zinc-400 mb-2">Target Month / Year</label>
                        <input type="month" id="inpMonth" value="${ym}" onchange="UI.state.lastMonth = this.value; UI.render();" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 outline-none focus:border-indigo-500 text-sm transition-colors text-white">
                    </div>
                    <button onclick="window.handleGenerate()" class="bg-white text-black px-6 py-2.5 rounded-lg font-bold hover:bg-zinc-200 transition-colors shadow flex items-center gap-2">
                        <i data-lucide="cpu" class="w-4 h-4"></i> Execute Engine
                    </button>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden shadow-xl">
                    <div class="overflow-x-auto max-h-[600px] relative">
                        <table class="w-full text-left text-sm text-zinc-300 whitespace-nowrap">
                            <thead class="bg-zinc-950 text-zinc-400 text-xs uppercase sticky top-0 z-10 border-b border-zinc-800">
                                <tr>
                                    <th class="px-6 py-4 font-semibold tracking-wider">Date</th>
                                    <th class="px-6 py-4 font-semibold tracking-wider">Role</th>
                                    <th class="px-6 py-4 font-semibold tracking-wider">Shift Node</th>
                                    <th class="px-6 py-4 font-semibold tracking-wider">Time Window</th>
                                    <th class="px-6 py-4 font-semibold tracking-wider text-right">Assigned Personnel</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-zinc-800/50">
                                ${scheduleRows.length > 0 ? scheduleRows.map((s, i) => `
                                <tr class="hover:bg-zinc-800/30 transition-colors ${i % 2 === 0 ? 'bg-zinc-900/10' : ''}">
                                    <td class="px-6 py-3.5 font-medium text-zinc-300">${formatDate(s.date)}</td>
                                    <td class="px-6 py-3.5 text-zinc-400">${s.role}</td>
                                    <td class="px-6 py-3.5 text-zinc-400">${s.shift}</td>
                                    <td class="px-6 py-3.5 text-xs font-mono text-zinc-500 bg-black/20 rounded px-2 mx-6 self-start w-fit">
                                        ${formatTime(s.start)} - ${formatTime(s.end)}
                                    </td>
                                    <td class="px-6 py-3.5 text-right">
                                        ${s.person === 'UNFILLED' 
                                            ? `<span class="inline-flex items-center gap-1.5 bg-red-500/10 text-red-400 border border-red-500/20 px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wide"><i data-lucide="alert-triangle" class="w-3 h-3"></i> Unfilled</span>`
                                            : `<span class="font-semibold text-zinc-200">${s.person}</span>`
                                        }
                                    </td>
                                </tr>
                                `).join('') : `
                                <tr><td colspan="5" class="px-6 py-20 text-center text-zinc-500">
                                    <div class="flex flex-col items-center justify-center opacity-40">
                                        <i data-lucide="calendar-x" class="w-16 h-16 mb-4"></i>
                                        <p class="text-lg">${ym ? "Engine has not generated data for this timeframe." : "Select a valid timeframe to inspect data."}</p>
                                    </div>
                                </td></tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            `;
        }

        function Loader() {
            return `
            <div class="fixed inset-0 bg-zinc-950/80 backdrop-blur z-50 flex flex-col items-center justify-center animate-in fade-in duration-200">
                <div class="w-12 h-12 border-4 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin mb-4 shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
                <p class="text-indigo-300 font-semibold tracking-widest text-sm uppercase animate-pulse">Syncing Database...</p>
            </div>
            `;
        }

        function Toast(toast) {
            const isErr = toast.type === 'error';
            return `
            <div class="fixed bottom-8 right-8 z-50 animate-in slide-in-from-bottom-8 fade-in duration-300">
                <div class="${isErr ? 'bg-red-500 text-white' : 'bg-white text-zinc-900'} px-5 py-3.5 rounded-xl shadow-2xl font-semibold text-sm flex items-center gap-3 border ${isErr ? 'border-red-400' : 'border-zinc-200'}">
                    <i data-lucide="${isErr ? 'alert-octagon' : 'check-circle'}" class="w-5 h-5 ${isErr ? 'text-white' : 'text-green-500'}"></i>
                    ${toast.msg}
                </div>
            </div>
            `;
        }

        // ==============================================
        // ACTION HANDLERS (Bound to Window)
        // ==============================================
        window.switchTab = (tab) => { 
            UI.state.activeTab = tab; 
            UI.render(); 
        };

        window.handleAddPerson = () => {
            const val = document.getElementById('inpPersonName').value.trim();
            if(val) UI.dispatch('addPerson', { personName: val });
        };

        window.handleBulkImport = () => {
            const names = document.getElementById('inpBulkPerson').value.split(/\r?\n|,/).map(n=>n.trim()).filter(n=>n);
            if(names.length > 0) UI.dispatch('importPersonnel', { names });
        };

        window.toggleDays = (isChecked) => {
            document.querySelectorAll('.role-day-cb').forEach(cb => {
                cb.checked = isChecked;
                cb.disabled = isChecked;
            });
        };

        window.renderShiftInputs = () => {
            const num = parseInt(document.getElementById('inpNumShifts').value) || 1;
            let html = '';
            for(let i=1; i<=num; i++) {
                html += `
                <div class="flex gap-4 items-center bg-zinc-900 p-4 rounded-lg border border-zinc-800">
                    <div class="flex-1">
                        <label class="block text-[10px] font-bold text-zinc-500 mb-1.5 uppercase tracking-widest">Shift ${i} Node</label>
                        <input type="text" id="sName_${i}" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm outline-none focus:border-indigo-500" value="Shift ${i}">
                    </div>
                    <div class="w-36">
                        <label class="block text-[10px] font-bold text-zinc-500 mb-1.5 uppercase tracking-widest">Start Time</label>
                        <input type="time" id="sStart_${i}" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm outline-none focus:border-indigo-500 text-zinc-300">
                    </div>
                    <div class="w-36">
                        <label class="block text-[10px] font-bold text-zinc-500 mb-1.5 uppercase tracking-widest">End Time</label>
                        <input type="time" id="sEnd_${i}" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm outline-none focus:border-indigo-500 text-zinc-300">
                    </div>
                </div>
                `;
            }
            const container = document.getElementById('shiftRowsContainer');
            if(container) container.innerHTML = html;
        };

        window.handleAddRole = () => {
            const roleName = document.getElementById('inpRoleName').value.trim();
            const is247 = document.getElementById('inpIs247').checked;
            const days = [];
            
            if (is247) {
                ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => days.push(d));
            } else {
                document.querySelectorAll('.role-day-cb:checked').forEach(cb => days.push(cb.value));
            }
            
            const num = parseInt(document.getElementById('inpNumShifts').value) || 1;
            const shifts = [];
            for(let i=1; i<=num; i++) {
                const sn = document.getElementById(`sName_${i}`).value.trim();
                const st = document.getElementById(`sStart_${i}`).value;
                const se = document.getElementById(`sEnd_${i}`).value;
                if(!sn || !st || !se) return UI.showToast("Missing parameters in shift inputs.", "error");
                shifts.push({ name: sn, start: st, end: se });
            }

            if(!roleName) return UI.showToast("Role name is required.", "error");
            if(days.length === 0) return UI.showToast("Select at least one day constraint.", "error");

            UI.dispatch('addRole', { roleName, is247, daysOfWeek: days, shifts });
        };

        window.handleAssign = () => {
            const personId = document.getElementById('selPerson').value;
            const roleId = document.getElementById('selRole').value;
            if(!personId || !roleId) return UI.showToast("Select both a person and a role.", "error");
            UI.dispatch('tagPerson', { personId, roleId });
        };

        window.handleGenerate = () => {
            const ym = document.getElementById('inpMonth').value;
            if(!ym) return UI.showToast("Select a valid month to execute engine.", "error");
            const [year, month] = ym.split('-');
            
            if(UI.state.data.roles.length === 0 || UI.state.data.personnel.length === 0) {
                return UI.showToast("Engine halted: Missing personnel or roles.", "error");
            }
            
            UI.dispatch('generateSchedule', { year: parseInt(year), month: parseInt(month) });
        };

        // Bootstrap App
        window.onload = () => UI.init();

    </script>
</body>
</html>
