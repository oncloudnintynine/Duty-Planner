<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DutyPlanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #52525b; }
      .hide-scroll::-webkit-scrollbar { display: none; }
      
      /* Input Overrides for perfect Dark Mode contrast */
      input[type="text"], input[type="number"], input[type="time"], input[type="month"], select {
          color: #ffffff !important;
          background-color: #27272a !important; /* zinc-800 */
          border-color: #52525b !important; /* zinc-600 */
          -webkit-appearance: none;
      }
      input:focus, select:focus {
          border-color: #818cf8 !important;
          box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2) !important;
          outline: none !important;
      }
      ::placeholder {
          color: #a1a1aa !important; /* zinc-400 */
          opacity: 1 !important;
      }
      
      /* Desktop active tab */
      .tab-btn.active { background-color: rgba(99, 102, 241, 0.15); color: #a5b4fc; border-right: 3px solid #818cf8; }
      /* Mobile active tab */
      .mobile-tab-btn.active { color: #818cf8; }
      .mobile-tab-btn.active span { font-weight: 700; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-indigo-500/30 overflow-hidden">

  <div id="app"></div>

  <script>
      // REPLACE WITH YOUR ACTUAL WEB APP DEPLOYMENT URL
      const API_URL = "https://script.google.com/macros/s/AKfycbzBf4TJr_ZBPLZJEx4msOy-zXqSZkUU621FO7q3TrC0ml3ZKACComdBPLZ2ahw032v2/exec";

      // ==============================================
      // FRAMEWORK / STATE MANAGER
      // ==============================================
      const UI = {
          state: {
              activeTab: 'setup',
              loading: false,
              lastMonth: '',
              searchQuery: '',
              selectedPersonId: null,
              editingRoleId: null,
              data: { seniorities: [], personnel: [], roles: [], shifts: [], tags: [], schedule: [] }
          },
          
          init() {
              this.dispatch('sync');
          },

          async dispatch(action, payload = {}) {
              this.state.loading = true;
              this.render();
              
              try {
                  const res = await fetch(API_URL, {
                      method: 'POST',
                      headers: { 'Content-Type': 'text/plain' },
                      body: JSON.stringify({ action, ...payload })
                  });
                  const json = await res.json();
                  
                  if (json.status === 'success') {
                      this.state.data = json.data;
                      if (json.message) this.showToast(json.message, 'success');
                      
                      if (action === 'deletePerson' && payload.id === this.state.selectedPersonId) {
                          this.state.selectedPersonId = null;
                      }
                      if (action === 'updateRole' || action === 'addRole') {
                          this.state.editingRoleId = null;
                      }
                      if (action === 'deleteRole' && payload.id === this.state.editingRoleId) {
                          this.state.editingRoleId = null;
                      }
                  } else {
                      this.showToast(json.message || "An error occurred", 'error');
                  }
              } catch (e) {
                  this.showToast("Network Error: Could not connect to database.", 'error');
              }
              
              this.state.loading = false;
              this.render();
          },

          showToast(msg, type) {
              const existing = document.getElementById('toast-container');
              if (existing) existing.remove();
              
              const isErr = type === 'error';
              const toastHtml = `
              <div id="toast-container" class="fixed bottom-24 md:bottom-8 right-4 md:right-8 z-50 animate-in slide-in-from-bottom-8 fade-in duration-300">
                  <div class="${isErr ? 'bg-red-500 text-white' : 'bg-white text-zinc-900'} px-4 py-3 md:px-5 md:py-3.5 rounded-xl shadow-2xl font-bold text-sm flex items-center gap-3 border ${isErr ? 'border-red-400' : 'border-zinc-200'}">
                      <i data-lucide="${isErr ? 'alert-octagon' : 'check-circle'}" class="w-5 h-5 ${isErr ? 'text-white' : 'text-emerald-500'}"></i>
                      ${msg}
                  </div>
              </div>
              `;
              document.body.insertAdjacentHTML('beforeend', toastHtml);
              if (window.lucide) window.lucide.createIcons();
              
              setTimeout(() => {
                  const t = document.getElementById('toast-container');
                  if (t) {
                      t.style.opacity = '0';
                      t.style.transition = 'opacity 0.3s ease';
                      setTimeout(() => t.remove(), 300);
                  }
              }, 3000);
          },
          
          render() {
              const activeEl = document.activeElement;
              const activeId = activeEl ? activeEl.id : null;
              let cursorStart = null;
              let cursorEnd = null;

              if (activeId && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
                  try {
                      cursorStart = activeEl.selectionStart;
                      cursorEnd = activeEl.selectionEnd;
                  } catch (e) {} 
              }

              document.getElementById('app').innerHTML = AppTemplate(this.state);
              if (window.lucide) window.lucide.createIcons();

              if (this.state.activeTab === 'setup' && !this.state.editingRoleId) {
                  if (typeof window.renderShiftInputs === 'function') {
                      window.renderShiftInputs();
                  }
              }

              if (activeId) {
                  const restoredEl = document.getElementById(activeId);
                  if (restoredEl) {
                      restoredEl.focus();
                      if (cursorStart !== null && cursorEnd !== null) {
                          try { restoredEl.setSelectionRange(cursorStart, cursorEnd); } catch (e) {}
                      }
                  }
              }
          }
      };

      function getSeniorityName(id, state) {
          const s = state.data.seniorities.find(x => x.id === id);
          return s ? s.name : 'Unassigned';
      }

      // ==============================================
      // COMPONENTS
      // ==============================================
      function AppTemplate(state) {
          return `
          <div class="flex h-screen w-full bg-zinc-950 overflow-hidden relative">
              ${DesktopSidebar(state)}
              <main class="flex-1 h-full overflow-y-auto overflow-x-hidden pb-24 md:pb-12 pt-6 md:pt-8 px-4 md:px-8 w-full relative">
                  <div class="max-w-6xl mx-auto">
                      ${state.activeTab === 'setup' ? SetupView(state) : ''}
                      ${state.activeTab === 'manage' ? ManageView(state) : ''}
                      ${state.activeTab === 'roster' ? RosterView(state) : ''}
                      ${state.activeTab === 'calc' ? ManpowerCalculatorView(state) : ''}
                      ${state.activeTab === 'settings' ? AdvancedSettingsView(state) : ''}
                  </div>
              </main>
              ${MobileNav(state)}
          </div>
          ${state.loading ? Loader() : ''}
          `;
      }

      function DesktopSidebar(state) {
          const tabs = [
              { id: 'setup', name: 'Topology & Setup', icon: 'database' },
              { id: 'manage', name: 'Assignments', icon: 'users' },
              { id: 'roster', name: 'Roster Engine', icon: 'calendar-days' },
              { id: 'calc', name: 'Calculator', icon: 'calculator' },
              { id: 'settings', name: 'Settings', icon: 'settings' }
          ];
          return `
          <aside class="hidden md:flex w-64 lg:w-72 bg-zinc-900 border-r border-zinc-800 flex-col z-20 shadow-2xl shrink-0">
              <div class="p-6 border-b border-zinc-800 flex items-center gap-3">
                  <div class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center border border-indigo-500/50 text-indigo-400 shrink-0">
                      <i data-lucide="shield-check" class="w-5 h-5"></i>
                  </div>
                  <div>
                      <h1 class="text-lg font-bold text-white leading-tight truncate">DutyPlanner</h1>
                  </div>
              </div>
              <nav class="flex-1 p-4 space-y-2 overflow-y-auto hide-scroll">
                  ${tabs.map(t => `
                      <button onclick="window.switchTab('${t.id}')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all duration-200 ${state.activeTab === t.id ? 'active' : (t.id === 'settings' ? 'text-zinc-500 hover:bg-zinc-800/50 hover:text-white' : 'text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200')} border-r-2 border-transparent">
                          <i data-lucide="${t.icon}" class="w-5 h-5 shrink-0"></i>
                          <span class="truncate">${t.name}</span>
                      </button>
                  `).join('')}
              </nav>
          </aside>
          `;
      }

      function MobileNav(state) {
          const tabs = [
              { id: 'setup', name: 'Setup', icon: 'database' },
              { id: 'manage', name: 'Assign', icon: 'users' },
              { id: 'roster', name: 'Roster', icon: 'calendar-days' },
              { id: 'calc', name: 'Calc', icon: 'calculator' },
              { id: 'settings', name: 'Settings', icon: 'settings' }
          ];
          return `
          <nav class="md:hidden fixed bottom-0 left-0 w-full bg-zinc-900/95 backdrop-blur border-t border-zinc-800 z-50 flex justify-around items-center px-2 pt-2 pb-6 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
              ${tabs.map(t => `
                  <button onclick="window.switchTab('${t.id}')" class="mobile-tab-btn flex flex-col items-center justify-center gap-1.5 w-16 h-12 transition-colors ${state.activeTab === t.id ? 'active' : 'text-zinc-500 hover:text-zinc-300'}">
                      <i data-lucide="${t.icon}" class="w-5 h-5"></i>
                      <span class="text-[10px] leading-none">${t.name}</span>
                  </button>
              `).join('')}
          </nav>
          `;
      }

      function AdvancedSettingsView(state) {
          const sortedSen = [...state.data.seniorities].sort((a,b) => a.order - b.order);

          return `
          <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-4xl pb-4">
              <div class="mb-6 md:mb-4">
                  <h2 class="text-2xl md:text-3xl font-bold text-white">Advanced Settings</h2>
                  <p class="text-zinc-400 text-sm mt-1">Configure global application data and execute database operations.</p>
              </div>

              <!-- Seniority Tiers Manager -->
              <div class="bg-zinc-900 border border-zinc-700 rounded-xl p-4 md:p-6 shadow-xl mt-6">
                  <h3 class="text-lg font-bold text-white mb-2 flex items-center gap-2"><i data-lucide="bar-chart" class="w-5 h-5 text-indigo-400"></i> Manage Seniority Tiers</h3>
                  <p class="text-sm text-zinc-300 mb-6">Define the levels of seniority in your organization. Changes here automatically update personnel records, shift requirements, and the manpower calculator.</p>
                  
                  <div class="space-y-4 mb-6">
                      ${sortedSen.map(sen => `
                          <div class="flex flex-col sm:flex-row sm:items-center gap-4 bg-zinc-950 p-4 rounded-lg border border-zinc-600 shadow-inner">
                              <div class="flex gap-4 flex-1">
                                  <div class="w-20 shrink-0">
                                      <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold mb-1.5 block">Sort Order</label>
                                      <input type="number" id="senOrder_${sen.id}" value="${sen.order}" class="w-full rounded px-3 py-2 text-sm outline-none">
                                  </div>
                                  <div class="flex-1">
                                      <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold mb-1.5 block">Tier Name</label>
                                      <input type="text" id="senName_${sen.id}" value="${sen.name}" class="w-full rounded px-3 py-2 text-sm outline-none">
                                  </div>
                              </div>
                              <div class="flex items-end justify-end gap-3 mt-1 sm:mt-0 pt-3 sm:pt-0 border-t sm:border-0 border-zinc-800">
                                  <button onclick="window.handleUpdateSeniorityTier('${sen.id}')" class="bg-zinc-700 hover:bg-zinc-600 text-white border border-zinc-500 rounded px-4 py-2 text-sm font-bold transition-colors shadow">Update</button>
                                  <button onclick="window.handleDeleteSeniorityTier('${sen.id}')" class="text-zinc-400 hover:text-red-400 text-sm px-2 py-2 transition-colors flex items-center justify-center bg-zinc-800 rounded border border-transparent hover:border-red-500/30" title="Delete Tier"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                              </div>
                          </div>
                      `).join('')}
                  </div>

                  <div class="pt-5 border-t border-zinc-700 flex flex-col sm:flex-row gap-4 items-end">
                      <div class="flex-1 w-full sm:w-auto">
                          <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold mb-1.5 block">New Tier Name</label>
                          <input type="text" id="newSenName" placeholder="e.g. Trainee" class="w-full rounded-lg px-4 py-2.5 text-sm outline-none">
                      </div>
                      <div class="w-full sm:w-32">
                          <label class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold mb-1.5 block">Sort Order</label>
                          <input type="number" id="newSenOrder" placeholder="e.g. 4" class="w-full rounded-lg px-4 py-2.5 text-sm outline-none">
                      </div>
                      <button onclick="window.handleAddSeniorityTier()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-lg text-sm font-bold transition-colors shadow">Add Tier</button>
                  </div>
              </div>

              <!-- Database System Tools -->
              <div class="bg-red-500/5 border border-red-500/30 rounded-xl overflow-hidden shadow-xl mt-8">
                  <div class="p-4 bg-red-500/10 border-b border-red-500/30 flex items-center gap-2">
                      <i data-lucide="alert-triangle" class="w-5 h-5 text-red-400"></i>
                      <h3 class="text-red-400 font-bold tracking-wide text-sm">System Database Operations</h3>
                  </div>

                  <div class="p-5 md:p-6 border-b border-red-500/10 flex flex-col md:flex-row gap-4 md:items-center justify-between hover:bg-zinc-800/40 transition-colors">
                      <div>
                          <h4 class="text-white font-bold flex items-center gap-2 mb-1">
                              <i data-lucide="database-zap" class="w-4 h-4 text-zinc-300"></i> Initialize Database Schema
                          </h4>
                          <p class="text-xs md:text-sm text-zinc-400">Creates all required missing sheets and headers. Run this only when connecting to a completely empty Google Sheet for the first time.</p>
                      </div>
                      <button onclick="window.handleSetupDatabase()" class="shrink-0 w-full md:w-auto bg-zinc-800 text-white px-5 py-2.5 rounded-lg text-sm font-bold hover:bg-zinc-700 transition-colors border border-zinc-600 shadow">
                          Run Setup
                      </button>
                  </div>

                  <div class="p-5 md:p-6 flex flex-col md:flex-row gap-4 md:items-center justify-between hover:bg-zinc-800/40 transition-colors">
                      <div>
                          <h4 class="text-white font-bold flex items-center gap-2 mb-1">
                              <i data-lucide="file-up" class="w-4 h-4 text-orange-400"></i> Run Data Migration (v3)
                          </h4>
                          <p class="text-xs md:text-sm text-zinc-400">Upgrades existing data to support fully dynamic Seniority Tiers. <span class="text-red-400 font-bold">Warning: This will clear existing Schedule generation.</span></p>
                      </div>
                      <button onclick="window.handleRunMigration()" class="shrink-0 w-full md:w-auto bg-orange-500/10 text-orange-400 px-5 py-2.5 rounded-lg text-sm font-bold hover:bg-orange-500/20 transition-colors border border-orange-500/40 shadow">
                          Execute Migration
                      </button>
                  </div>
              </div>
          </div>
          `;
      }

      function SetupView(state) {
          const isEditing = !!state.editingRoleId;
          
          return `
          <div class="space-y-6 md:space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
              <div class="mb-4 md:mb-2">
                  <h2 class="text-2xl md:text-3xl font-bold text-white">Database Setup</h2>
                  <p class="text-zinc-300 text-sm mt-1">Configure your roles, concurrency matrix, and shift headcount requirements.</p>
              </div>

              <div class="bg-zinc-900 border ${isEditing ? 'border-indigo-500 shadow-indigo-500/10' : 'border-zinc-700'} rounded-xl p-4 md:p-6 shadow-xl">
                  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3 mb-5 border-b border-zinc-800 pb-4 md:pb-0 md:border-0">
                      <h3 class="text-lg font-bold ${isEditing ? 'text-indigo-400' : 'text-white'} flex items-center gap-2">
                          <i data-lucide="briefcase" class="w-5 h-5 ${isEditing ? 'text-indigo-400' : 'text-indigo-400'}"></i> 
                          ${isEditing ? 'Editing Role Configuration' : 'New Role & Shift Logic'}
                      </h3>
                      ${isEditing ? `<button onclick="window.handleCancelEdit()" class="w-full md:w-auto text-sm font-medium text-zinc-400 hover:text-white px-4 py-2 bg-zinc-800 border border-zinc-600 rounded-lg shadow flex items-center justify-center gap-2"><i data-lucide="x-circle" class="w-4 h-4"></i> Cancel Edit</button>` : ''}
                  </div>
                  
                  <div class="space-y-6">
                      
                      <div class="grid grid-cols-1 md:grid-cols-3 gap-5 md:gap-6">
                          <div>
                              <label class="block text-sm font-bold text-zinc-200 mb-2">Role Name</label>
                              <input type="text" id="inpRoleName" class="w-full rounded-lg px-4 py-2.5 text-sm" placeholder="e.g. Area Commander">
                          </div>
                          <div>
                              <label class="block text-sm font-bold text-zinc-200 mb-2">Role Type</label>
                              <select id="inpRoleType" class="w-full rounded-lg px-4 py-2.5 text-sm">
                                  <option value="On-Site">On-Site (Requires Presence)</option>
                                  <option value="Standby">Standby (Recall Only)</option>
                              </select>
                          </div>
                          <div>
                              <label class="block text-sm font-bold text-zinc-200 mb-2">Weekly Pattern</label>
                              <label class="flex items-center gap-3 bg-zinc-800 border border-zinc-600 rounded-lg px-4 py-2.5 cursor-pointer hover:border-indigo-400 transition-colors w-full">
                                  <input type="checkbox" id="inpIs247" onchange="window.toggleDays(this.checked)" class="w-5 h-5 rounded border-zinc-500 bg-zinc-900 text-indigo-500 focus:ring-indigo-500 shrink-0">
                                  <span class="text-sm font-bold text-white">Runs 24/7 (Mon-Sun)</span>
                              </label>
                          </div>
                      </div>

                      <div>
                          <label class="block text-sm font-bold text-zinc-200 mb-3">Target Days (if not 24/7)</label>
                          <div class="flex flex-wrap gap-2 md:gap-3">
                              ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(day => `
                                  <label class="flex items-center gap-2 bg-zinc-800 border border-zinc-600 px-4 py-2 rounded-md cursor-pointer hover:border-indigo-400 transition-colors flex-1 sm:flex-none justify-center">
                                      <input type="checkbox" value="${day}" class="role-day-cb w-4 h-4 rounded border-zinc-500 bg-zinc-900 text-indigo-500 focus:ring-indigo-500">
                                      <span class="text-sm font-bold text-white">${day}</span>
                                  </label>
                              `).join('')}
                          </div>
                      </div>

                      ${state.data.roles.length > 0 ? `
                      <div class="p-4 md:p-5 bg-zinc-800/50 border border-zinc-600 rounded-lg">
                          <label class="block text-sm font-bold text-zinc-200 mb-2">Concurrency Matrix</label>
                          <p class="text-xs text-zinc-400 mb-4 leading-relaxed">Select other roles that this person can execute at the exact same time without violating the rest rules.</p>
                          <div class="flex flex-wrap gap-2.5">
                              ${state.data.roles.map(r => `
                                  <label class="flex items-center gap-2 bg-zinc-800 border border-zinc-600 px-3 py-2 rounded-md cursor-pointer hover:border-indigo-400 transition-colors shrink-0">
                                      <input type="checkbox" value="${r.id}" class="role-concurrent-cb w-4 h-4 rounded border-zinc-500 bg-zinc-900 text-indigo-500 focus:ring-indigo-500 shrink-0">
                                      <span class="text-xs font-bold text-white">${r.name}</span>
                                  </label>
                              `).join('')}
                          </div>
                      </div>
                      ` : ''}

                      <div class="bg-zinc-800/30 rounded-lg p-4 md:p-6 border border-zinc-600 mt-6 shadow-inner">
                          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5 pb-5 border-b border-zinc-600/50">
                              <div>
                                  <label class="block text-base font-bold text-white">Shift Topology & Headcount</label>
                                  <p class="text-xs text-zinc-400 mt-1">Define shift times and required personnel per seniority.</p>
                              </div>
                              <select id="inpNumShifts" onchange="window.renderShiftInputs()" class="rounded-lg px-4 py-2 text-sm w-full sm:w-32 font-bold shadow-md">
                                  <option value="1">1 Shift</option>
                                  <option value="2">2 Shifts</option>
                                  <option value="3">3 Shifts</option>
                                  <option value="4">4 Shifts</option>
                              </select>
                          </div>
                          <!-- This Container MUST be hydrated by renderShiftInputs() -->
                          <div id="shiftRowsContainer" class="space-y-5"></div>
                      </div>

                      <div class="pt-4 flex justify-end">
                          <button onclick="window.handleSaveRole()" class="w-full md:w-auto ${isEditing ? 'bg-indigo-600 hover:bg-indigo-500 text-white' : 'bg-white text-zinc-900 hover:bg-zinc-200'} px-8 py-3.5 md:py-3 rounded-lg font-bold transition-all text-sm shadow-xl flex items-center justify-center gap-2">
                              ${isEditing ? '<i data-lucide="save" class="w-5 h-5"></i> Update Role' : '<i data-lucide="plus-circle" class="w-5 h-5"></i> Add Role to Database'}
                          </button>
                      </div>
                  </div>
              </div>

              <!-- Configured Roles Cards List -->
              <div class="bg-zinc-900 border border-zinc-700 rounded-xl flex flex-col shadow-xl">
                  <div class="p-4 border-b border-zinc-700 bg-zinc-800/80 rounded-t-xl flex justify-between items-center">
                      <h3 class="font-bold text-white text-sm tracking-wide uppercase">Configured Roles</h3>
                      <span class="text-xs font-bold bg-indigo-500/20 border border-indigo-500/30 px-2 py-0.5 rounded text-indigo-300">${state.data.roles.length} Roles</span>
                  </div>
                  <div class="flex flex-col divide-y divide-zinc-700/50 max-h-[400px] overflow-y-auto hide-scroll">
                      ${state.data.roles.map(r => `
                      <div class="p-4 md:p-5 hover:bg-zinc-800/60 transition-colors flex flex-col md:flex-row md:items-center justify-between gap-4 ${state.editingRoleId === r.id ? 'bg-indigo-500/10' : ''}">
                          <div>
                              <div class="font-bold text-white flex flex-wrap items-center gap-2 text-base mb-1.5">
                                  ${r.name} 
                                  <span class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider ${r.type === 'Standby' ? 'bg-orange-500/20 text-orange-400 border border-orange-500/40' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/40'}">${r.type}</span>
                              </div>
                              <div class="text-xs text-zinc-400 font-medium flex items-center gap-2">
                                  <i data-lucide="calendar" class="w-3.5 h-3.5 shrink-0"></i>
                                  ${r.is247 === true || r.is247 === 'TRUE' ? '<span class="text-indigo-300 font-bold">24/7 Continuous (Mon-Sun)</span>' : `<span class="break-words">${r.days}</span>`}
                              </div>
                          </div>
                          <div class="flex items-center justify-end gap-3 mt-2 md:mt-0 pt-3 md:pt-0 border-t border-zinc-800 md:border-0">

      function ManpowerCalculatorView(state) {
          const sortedSen = [...state.data.seniorities].sort((a,b) => a.order - b.order);
          const existingCount = {};
          sortedSen.forEach(s => existingCount[s.id] = 0);

          state.data.personnel.forEach(p => {
              if(p.seniority && existingCount[p.seniority] !== undefined) existingCount[p.seniority]++;
          });

          const DUTY_HOURS_PER_PERSON_PER_WEEK = 15; 
          let workings = {};
          sortedSen.forEach(s => workings[s.id] = { onSiteHrs: 0, standbyHrs: 0, totalHrs: 0, requiredCount: 0 });

          state.data.roles.forEach(r => {
              let daysPerWeek = (r.is247 === true || r.is247 === 'TRUE') ? 7 : (r.days.split(',').filter(x=>x).length);
              let roleShifts = state.data.shifts.filter(s => s.roleId === r.id);
              
              roleShifts.forEach(s => {
                  let st = new Date(`2000-01-01T${s.start || '00:00'}`);
                  let et = new Date(`2000-01-01T${s.end || '00:00'}`);
                  if(et <= st) et.setDate(et.getDate() + 1);
                  let hrs = (et - st) / 3600000;

                  let shiftReqs = {};
                  try{ shiftReqs = JSON.parse(s.reqs); }catch(e){}

                  sortedSen.forEach(sen => {
                      let count = parseInt(shiftReqs[sen.id]) || 0;
                      if(count > 0) {
                          if (r.type === 'Standby') {
                              let weeklyStdbyHrs = 12 * count * (daysPerWeek / 7);
                              workings[sen.id].standbyHrs += weeklyStdbyHrs;
                              workings[sen.id].totalHrs += weeklyStdbyHrs;
                          } else {
                              let weeklyOnSiteHrs = hrs * count * daysPerWeek;
                              workings[sen.id].onSiteHrs += weeklyOnSiteHrs;
                              workings[sen.id].totalHrs += weeklyOnSiteHrs;
                          }
                      }
                  });
              });
          });

          sortedSen.forEach(sen => {
              workings[sen.id].requiredCount = Math.ceil(workings[sen.id].totalHrs / DUTY_HOURS_PER_PERSON_PER_WEEK);
          });

          return `
          <div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-4">
              <div class="mb-6 md:mb-4">
                  <h2 class="text-2xl md:text-3xl font-bold text-white">Manpower Requirement Calculator</h2>

              </div>

              <!-- Top Results Grid -->
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  ${sortedSen.map(sen => {
                      const w = workings[sen.id];
                      const req = w.requiredCount;
                      const act = existingCount[sen.id];
                      const diff = act - req;
                      const isDeficit = diff < 0;
                      
                      return `
                      <div class="bg-zinc-900 border border-zinc-700 rounded-xl shadow-xl flex flex-col">
                          <div class="p-6 border-b border-zinc-700/50 bg-zinc-800/50 rounded-t-xl">
                              <h3 class="text-zinc-200 text-sm font-bold uppercase tracking-widest mb-5 flex items-center gap-2">
                                  <i data-lucide="user-check" class="w-5 h-5 text-indigo-400"></i> ${sen.name} Tier
                              </h3>
                              <div class="flex justify-between items-end">
                                  <div>
                                      <div class="text-4xl font-black text-white">${act}</div>
                                      <div class="text-[11px] uppercase tracking-widest font-bold text-zinc-400 mt-2">Current Headcount</div>
                                  </div>
                                  <div class="text-right">
                                      <div class="text-2xl font-bold text-zinc-300">${req}</div>

                                  </div>
                              </div>
                              <div class="pt-5 mt-5 border-t border-zinc-700">
                                  ${isDeficit 
                                      ? `<div class="text-red-400 font-bold text-sm flex items-center gap-2 bg-red-500/10 px-3 py-2 rounded-lg border border-red-500/20"><i data-lucide="trending-down" class="w-5 h-5"></i> Deficit of ${Math.abs(diff)} personnel</div>`
                                      : `<div class="text-emerald-400 font-bold text-sm flex items-center gap-2 bg-emerald-500/10 px-3 py-2 rounded-lg border border-emerald-500/20"><i data-lucide="trending-up" class="w-5 h-5"></i> Surplus of ${diff} personnel</div>`
                                  }
                              </div>
                          </div>
                          
                          <!-- Formula Workings Breakdown -->
                          <div class="p-5 bg-zinc-950/80 rounded-b-xl flex-1 border-t border-zinc-800">
                              <div class="text-[10px] uppercase font-bold text-zinc-500 tracking-widest mb-4 flex items-center gap-1.5"><i data-lucide="function-square" class="w-3.5 h-3.5"></i> Mathematical Workings</div>
                              <div class="space-y-2.5 text-xs font-mono text-zinc-300">
                                  <div class="flex justify-between border-b border-zinc-800/80 pb-2">
                                      <span>On-Site Demand:</span>

                      <!-- Card 1: Statutory Cap -->
                      <div class="bg-zinc-900 border border-zinc-700/80 rounded-xl p-5 relative overflow-hidden group hover:border-indigo-500/50 transition-colors shadow-lg">
                          <div class="absolute -right-4 -top-4 opacity-5 text-indigo-400 group-hover:scale-110 transition-transform duration-500"><i data-lucide="scale" class="w-32 h-32"></i></div>

             try { 
                const d = new Date(isoString); 
                if(!isNaN(d)) return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false}); 
             } catch(e) {}
             return isoString;
          };

          const formatDate = (isoString) => {
             try { 
                const d = new Date(isoString); 
                if(!isNaN(d)) return d.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'}); 
             } catch(e) {}
             return isoString;

                  <p class="text-zinc-300 text-sm mt-1 flex items-start sm:items-center gap-2">
                      <i data-lucide="info" class="w-4 h-4 text-indigo-400 mt-0.5 sm:mt-0 shrink-0"></i> 
                      Engine enforces strict 11-hour rest periods, 44hr limits, and handles Off-In-Lieu waivers dynamically.
                  </p>
              </div>

              <div class="bg-zinc-900 border border-zinc-700 rounded-xl p-4 md:p-6 shadow-xl flex flex-col md:flex-row md:items-end gap-4 md:gap-6">
                  <div class="w-full md:max-w-sm">
                      <label class="block text-sm font-bold text-zinc-300 mb-2">Target Month / Year</label>
                      <input type="month" id="inpMonth" value="${ym}" onchange="UI.state.lastMonth = this.value; UI.render();" class="w-full rounded-lg px-4 py-2.5">
                  </div>
                  <button onclick="window.handleGenerate()" class="w-full md:w-auto bg-white text-zinc-900 px-6 py-2.5 rounded-lg font-bold hover:bg-zinc-200 transition-colors shadow-lg flex items-center justify-center gap-2">
                      <i data-lucide="cpu" class="w-5 h-5"></i> Execute Engine
                  </button>
              </div>

              <div class="bg-zinc-900 border border-zinc-700 rounded-xl flex flex-col shadow-xl">
                  <div class="p-3 bg-zinc-800/80 border-b border-zinc-700 text-[10px] uppercase tracking-widest font-bold text-zinc-400 flex items-center gap-2 md:hidden rounded-t-xl">
                      <i data-lucide="move-horizontal" class="w-3.5 h-3.5"></i> Swipe horizontally to view full table
                  </div>
                  <div class="overflow-x-auto relative rounded-b-xl md:rounded-xl max-h-[600px]">
                      <table class="w-full text-left text-sm text-zinc-200 whitespace-nowrap min-w-[700px]">
                          <thead class="bg-zinc-800 text-zinc-300 text-xs uppercase sticky top-0 z-10 border-b border-zinc-700 shadow-sm">
                              <tr>
                                  <th class="px-5 py-4 font-bold tracking-wider">Date</th>
                                  <th class="px-5 py-4 font-bold tracking-wider">Role & Shift Node</th>
                                  <th class="px-5 py-4 font-bold tracking-wider">Seniority Req</th>
                                  <th class="px-5 py-4 font-bold tracking-wider">Time Window (24H)</th>
                                  <th class="px-5 py-4 font-bold tracking-wider text-right">Assigned Personnel</th>
                              </tr>
                          </thead>
                          <tbody class="divide-y divide-zinc-700/50">
                              ${scheduleRows.length > 0 ? scheduleRows.map((s, i) => `
                              <tr class="hover:bg-zinc-800/60 transition-colors ${i % 2 === 0 ? 'bg-zinc-950/30' : ''}">
                                  <td class="px-5 py-4 font-semibold text-white">${formatDate(s.date)}</td>
                                  <td class="px-5 py-4">
                                      <div class="font-bold text-indigo-300">${s.role}</div>
                                      <div class="text-[11px] font-bold text-zinc-400 mt-1 uppercase tracking-wider">${s.shift}</div>
                                  </td>
                                  <td class="px-5 py-4">
                                      <span class="bg-zinc-800 text-zinc-200 border border-zinc-600 px-2 py-1 rounded text-[10px] uppercase tracking-widest font-bold shadow-sm">${s.seniorityReqName || 'Any'}</span>
                                  </td>
                                  <td class="px-5 py-4 text-xs font-mono font-bold text-zinc-300">
                                      ${formatTime(s.start)} - ${formatTime(s.end)}
                                  </td>
                                  <td class="px-5 py-4 text-right">
                                      ${s.personName === 'UNFILLED' 
                                          ? `<span class="inline-flex items-center gap-1.5 bg-red-500/10 text-red-400 border border-red-500/30 px-2.5 py-1 rounded text-xs font-bold uppercase tracking-wide shadow-sm"><i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> Unfilled</span>`
                                          : `<span class="font-bold text-white text-base">${s.personName}</span>`
                                      }
                                  </td>
                              </tr>
                              `).join('') : `
                              <tr><td colspan="5" class="px-6 py-24 text-center text-zinc-400">
                                  <div class="flex flex-col items-center justify-center opacity-60">
                                      <i data-lucide="calendar-x" class="w-16 h-16 mb-4 text-zinc-500"></i>
                                      <p class="text-lg font-bold">${ym ? "Engine has not generated data for this timeframe." : "Select a valid timeframe to inspect data."}</p>
                                  </div>
                              </td></tr>
                              `}
                          </tbody>
                      </table>
                  </div>
              </div>
          </div>
          `;
      }

      function Loader() {
          return `
          <div class="fixed inset-0 bg-zinc-950/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center animate-in fade-in duration-200">
              <div class="w-12 h-12 border-4 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin mb-4 shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
              <p class="text-indigo-300 font-bold tracking-widest text-sm uppercase animate-pulse">Syncing Database...</p>
          </div>
          `;
      }

      // ==============================================
      // ACTION HANDLERS (Bound to Window)
      // ==============================================
      window.switchTab = (tab) => { 
          UI.state.activeTab = tab; 
          UI.render(); 
      };

      // Settings
      window.handleSetupDatabase = () => {
          if(confirm("WARNING: Are you sure you want to initialize the database schema? Do this only on an empty Google Sheet.")) {
              UI.dispatch('setupDatabase');
          }
      };

      window.handleRunMigration = () => {
          if(confirm("WARNING: This will upgrade the schema and permanently WIPE the existing schedule data. Proceed?")) {
              UI.dispatch('runMigration');
          }
      };

      // Seniorities
      window.handleAddSeniorityTier = () => {
          const name = document.getElementById('newSenName').value.trim();
          const order = parseInt(document.getElementById('newSenOrder').value);
          if(!name || isNaN(order)) return UI.showToast("Provide both Name and numerical Sort Order", "error");
          UI.dispatch('addSeniorityTier', { name, order });
      };

      window.handleUpdateSeniorityTier = (id) => {
          const name = document.getElementById(`senName_${id}`).value.trim();
          const order = parseInt(document.getElementById(`senOrder_${id}`).value);
          if(!name || isNaN(order)) return UI.showToast("Provide both Name and numerical Sort Order", "error");
          UI.dispatch('updateSeniorityTier', { id, name, order });
      };

      window.handleDeleteSeniorityTier = (id) => {
          if(confirm("Delete this tier? Personnel with this tier will be unassigned. Shift headcount required for this tier will be deleted permanently.")) {
              UI.dispatch('deleteSeniorityTier', { id });
          }
      };

      // Personnel
      window.handleAddPerson = () => {
          const val = document.getElementById('inpNewPerson').value.trim();
          const seniority = document.getElementById('inpNewSeniority').value;
          if(!seniority) return UI.showToast("Setup Seniority Tiers in Advanced Settings first.", "error");
          if(val) UI.dispatch('addPerson', { personName: val, seniority: seniority });
      };

      window.handleUpdateSeniority = (id, name) => {
          const seniority = document.getElementById('editSeniority').value;
          UI.dispatch('updatePerson', { id, personName: name, seniority });
      };

      window.handleBulkImport = (defaultSenId) => {
          const val = document.getElementById('inpBulkPerson').value;
          const names = val.split(/\r?\n|,/).map(n=>n.trim()).filter(n=>n);
          if(!defaultSenId) return UI.showToast("Setup Seniority Tiers in Advanced Settings first.", "error");
          if(names.length > 0) UI.dispatch('importPersonnel', { names, defaultSeniority: defaultSenId });
      };

      // Roles Config
      window.toggleDays = (isChecked) => {
          document.querySelectorAll('.role-day-cb').forEach(cb => {
              cb.checked = isChecked;
              cb.disabled = isChecked;
          });
          window.renderShiftInputs();
      };

      window.renderShiftInputs = () => {
          const num = parseInt(document.getElementById('inpNumShifts').value) || 1;
          const is247 = document.getElementById('inpIs247')?.checked || false;
          const sortedSen = [...UI.state.data.seniorities].sort((a,b) => a.order - b.order);
          
          if(sortedSen.length === 0) {
              const container = document.getElementById('shiftRowsContainer');
              if(container) container.innerHTML = '<div class="p-4 text-red-400 border border-red-500 bg-red-500/10 rounded-lg font-bold">Error: You must setup Seniority Tiers in Advanced Settings first.</div>';
              return;
          }

          const hideTimings = (is247 && num === 1);

          let html = '';
          for(let i=1; i<=num; i++) {
              html += `
              <div class="bg-zinc-800 p-4 md:p-5 rounded-lg border border-zinc-600 shadow-md space-y-4">
                  <div class="flex flex-col md:flex-row gap-4 md:items-center">
                      <div class="w-full flex-1">
                          <label class="block text-[10px] font-bold text-zinc-400 mb-1.5 uppercase tracking-widest">Shift Node</label>
                          <input type="text" id="sName_${i}" class="w-full rounded px-3 py-2 text-sm font-bold" value="Shift ${i}">
                      </div>
                      ${hideTimings ? `
                      <div class="w-full flex-1 flex items-center md:justify-center md:pt-5">
                          <div class="text-[11px] md:text-xs font-bold text-indigo-400 bg-indigo-500/10 border border-indigo-500/30 px-3 py-2 rounded uppercase tracking-wider flex items-center gap-2 w-full md:w-auto justify-center">
                             <i data-lucide="clock" class="w-4 h-4 shrink-0"></i> 24-Hour Continuous Shift
                          </div>
                          <input type="hidden" id="sStart_${i}" value="00:00">
                          <input type="hidden" id="sEnd_${i}" value="00:00">
                      </div>
                      ` : `
                      <div class="w-full md:w-auto flex gap-4">
                          <div class="flex-1 md:w-32">
                              <label class="block text-[10px] font-bold text-zinc-400 mb-1.5 uppercase tracking-widest">Start (24H)</label>
                              <input type="time" id="sStart_${i}" step="60" class="w-full rounded px-3 py-2 text-sm font-mono">
                          </div>
                          <div class="flex-1 md:w-32">
                              <label class="block text-[10px] font-bold text-zinc-400 mb-1.5 uppercase tracking-widest">End (24H)</label>
                              <input type="time" id="sEnd_${i}" step="60" class="w-full rounded px-3 py-2 text-sm font-mono">
                          </div>
                      </div>
                      `}
                  </div>
                  
                  <div class="border-t border-zinc-600/50 pt-4">
                      <label class="block text-[10px] font-bold text-zinc-400 mb-3 uppercase tracking-widest">Required Headcount Per Seniority</label>
                      <div class="flex flex-wrap gap-3">
                          ${sortedSen.map(sen => `
                          <div class="flex items-center gap-2 bg-zinc-900 border border-zinc-600 px-3 py-2 rounded-md shadow-inner flex-1 sm:flex-none justify-center sm:justify-start">
                              <span class="text-xs text-zinc-300 font-bold w-16 truncate">${sen.name}</span>
                              <input type="number" id="sReq_${sen.id}_${i}" value="0" min="0" class="w-12 bg-transparent text-white font-bold text-sm outline-none text-center border-l border-zinc-700 pl-2">
                          </div>
                          `).join('')}
                      </div>
                  </div>
              </div>
              `;
          }
          const container = document.getElementById('shiftRowsContainer');
          if(container) {
              container.innerHTML = html;
              if (window.lucide) window.lucide.createIcons();
          }
      };

      window.handleEditRole = (id) => {
          const role = UI.state.data.roles.find(r => r.id === id);
          if(!role) return;
          const shifts = UI.state.data.shifts.filter(s => s.roleId === id);
          
          UI.state.editingRoleId = id;
          UI.render(); 
          
          setTimeout(() => {
              document.getElementById('inpRoleName').value = role.name;
              document.getElementById('inpRoleType').value = role.type;
              
              const is247 = (role.is247 === true || role.is247 === 'TRUE');
              document.getElementById('inpIs247').checked = is247;
              
              document.querySelectorAll('.role-day-cb').forEach(cb => {
                  cb.checked = role.days.includes(cb.value);
                  cb.disabled = is247;
              });
              
              let cRoles = [];
              try { cRoles = JSON.parse(role.concurrentRoles); } catch(e){}
              document.querySelectorAll('.role-concurrent-cb').forEach(cb => {
                  cb.checked = cRoles.includes(cb.value);
              });
              
              document.getElementById('inpNumShifts').value = shifts.length;
              window.renderShiftInputs(); 
              
              setTimeout(() => {
                  shifts.forEach((s, i) => {
                      const idx = i + 1;
                      document.getElementById(`sName_${idx}`).value = s.name;
                      
                      const stInput = document.getElementById(`sStart_${idx}`);
                      const enInput = document.getElementById(`sEnd_${idx}`);
                      if(stInput && stInput.type !== 'hidden') stInput.value = (s.start || "").substring(0,5);
                      if(enInput && enInput.type !== 'hidden') enInput.value = (s.end || "").substring(0,5);
                      
                      let reqs = {};
                      try { reqs = JSON.parse(s.reqs); } catch(e){}
                      UI.state.data.seniorities.forEach(sen => {
                          const reqEl = document.getElementById(`sReq_${sen.id}_${idx}`);
                          if(reqEl) reqEl.value = reqs[sen.id] || 0;
                      });
                  });
              }, 50); 
          }, 50); 
      };

      window.handleCancelEdit = () => {
          UI.state.editingRoleId = null;
          UI.render();
          setTimeout(() => { window.renderShiftInputs(); }, 50);
      };

      window.handleSaveRole = () => {
          const roleName = document.getElementById('inpRoleName').value.trim();
          const roleType = document.getElementById('inpRoleType').value;
          const is247 = document.getElementById('inpIs247').checked;
          
          const days = [];
          if (is247) {
              ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => days.push(d));
          } else {
              document.querySelectorAll('.role-day-cb:checked').forEach(cb => days.push(cb.value));
          }

          const concurrentRoles = [];
          document.querySelectorAll('.role-concurrent-cb:checked').forEach(cb => concurrentRoles.push(cb.value));
          
          const sortedSen = [...UI.state.data.seniorities].sort((a,b) => a.order - b.order);
          const num = parseInt(document.getElementById('inpNumShifts').value) || 1;
          const shifts = [];
          
          for(let i=1; i<=num; i++) {
              const sn = document.getElementById(`sName_${i}`).value.trim();
              const st = document.getElementById(`sStart_${i}`).value;
              const se = document.getElementById(`sEnd_${i}`).value;
              
              const shiftReqs = {};
              sortedSen.forEach(sen => {
                  const el = document.getElementById(`sReq_${sen.id}_${i}`);
                  if(el) { shiftReqs[sen.id] = parseInt(el.value) || 0; }
              });

              if(!sn || !st || !se) return UI.showToast("Missing parameters in shift inputs.", "error");
              
              shifts.push({ 
                  name: sn, 
                  start: st, 
                  end: se,
                  reqs: shiftReqs
              });
          }

          if(!roleName) return UI.showToast("Role name is required.", "error");
          if(days.length === 0) return UI.showToast("Select at least one day constraint.", "error");

          const payload = { roleName, roleType, is247, daysOfWeek: days, concurrentRoles, shifts };

          if(UI.state.editingRoleId) {
              UI.dispatch('updateRole', { id: UI.state.editingRoleId, ...payload });
          } else {
              UI.dispatch('addRole', payload);
          }
      };

      window.handleAssign = (personId) => {
          const roleId = document.getElementById('assignRoleSelect').value;
          if(!roleId) return UI.showToast("Select a role to grant.", "error");
          UI.dispatch('tagPerson', { personId, roleId });
      };

      window.handleGenerate = () => {
          const ym = document.getElementById('inpMonth').value;
          if(!ym) return UI.showToast("Select a valid month to execute engine.", "error");
          const [year, month] = ym.split('-');
          
          if(UI.state.data.roles.length === 0 || UI.state.data.personnel.length === 0) {
              return UI.showToast("Engine halted: Missing personnel or roles.", "error");
          }
          
          UI.dispatch('generateSchedule', { year: parseInt(year), month: parseInt(month) });
      };

      // Bootstrap App
      window.onload = () => UI.init();

  </script>
</body>
</html>
