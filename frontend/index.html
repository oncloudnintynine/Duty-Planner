<!DOCTYPE html>
<html lang="en" class="dark">
<head>
 <meta charset="UTF-8">
 <!-- Aggressive mobile-first viewport scaling. Shrink-to-fit=no anchors layout boundaries strictly to physical device dimensions -->
 <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
 <meta name="theme-color" content="#18181b">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
 <title>DutyPlanner</title>
 <link rel="manifest" href="./manifest.json">
 
 <script src="https://cdn.tailwindcss.com"></script>
 <script src="https://unpkg.com/lucide@latest"></script>
 <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-indigo-500/30 overflow-hidden w-full max-w-full">

 <div id="app" class="w-full h-full max-w-full relative"></div>

 <!-- ES Module Application Bootstrapper -->
 <script type="module" src="./js/app.js"></script>

 <script>
     // Service Worker Registration for PWA Installation
     if ('serviceWorker' in navigator) {
         window.addEventListener('load', () => {
             navigator.serviceWorker.register('./sw.js').catch(err => {
                 console.log('ServiceWorker registration failed: ', err);
             });
         });
     }
 </script>
</body>
</html>
