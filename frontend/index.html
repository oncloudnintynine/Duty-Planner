<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Duty Roster Planner</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #f4f7f6; color: #333;}
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;}
        h2 { margin-top: 0; color: #444; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="text"], input[type="time"], select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;}
        .checkbox-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 5px; }
        .checkbox-group label { display: flex; align-items: center; font-weight: normal; }
        .checkbox-group input { margin-right: 5px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s;}
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-success { background: #28a745; margin-bottom: 15px; }
        .btn-success:hover { background: #218838; }
        #timeSettings { margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 4px; border: 1px solid #eee; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #222;">Duty Roster Planner</h1>

    <!-- 1. Add Personnel Section -->
    <div class="card">
        <h2>1. Add Personnel</h2>
        <div class="form-group">
            <label for="personName">Full Name</label>
            <input type="text" id="personName" placeholder="Enter personnel's full name">
        </div>
        <button id="btnAddPerson" onclick="addPerson()">Add Person</button>
    </div>

    <!-- 2. Add Role Section -->
    <div class="card">
        <h2>2. Add Role</h2>
        <div class="form-group">
            <label for="roleName">Role Name</label>
            <input type="text" id="roleName" placeholder="e.g., Security Guard, IT Support">
        </div>
        
        <div class="form-group">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="is247" onchange="toggleTimeSettings()" style="width: auto; margin-right: 10px; transform: scale(1.2);"> 
                This role requires 24/7 manning
            </label>
        </div>

        <div id="timeSettings">
            <div class="form-group">
                <label for="startTime">Start Time</label>
                <input type="time" id="startTime">
            </div>
            <div class="form-group">
                <label for="endTime">End Time</label>
                <input type="time" id="endTime">
            </div>
            <div class="form-group">
                <label>Days of the Week Required</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="days" value="Mon"> Mon</label>
                    <label><input type="checkbox" name="days" value="Tue"> Tue</label>
                    <label><input type="checkbox" name="days" value="Wed"> Wed</label>
                    <label><input type="checkbox" name="days" value="Thu"> Thu</label>
                    <label><input type="checkbox" name="days" value="Fri"> Fri</label>
                    <label><input type="checkbox" name="days" value="Sat"> Sat</label>
                    <label><input type="checkbox" name="days" value="Sun"> Sun</label>
                </div>
            </div>
        </div>
        <button id="btnAddRole" onclick="addRole()">Add Role</button>
    </div>

    <!-- 3. Tag Personnel to Roles Section -->
    <div class="card">
        <h2>3. Assign Personnel to Roles</h2>
        <button id="btnRefresh" class="btn-success" onclick="loadDropdowns()">Load / Refresh Dropdowns</button>
        <div class="form-group">
            <label for="personSelect">Select Personnel</label>
            <select id="personSelect"><option value="">-- Please load dropdowns first --</option></select>
        </div>
        <div class="form-group">
            <label for="roleSelect">Select Role</label>
            <select id="roleSelect"><option value="">-- Please load dropdowns first --</option></select>
        </div>
        <button id="btnAssign" onclick="tagPerson()">Assign Role</button>
    </div>

    <script>
        // Your specific Standalone Google Apps Script Web App URL
        const API_URL = "https://script.google.com/macros/s/AKfycbzBf4TJr_ZBPLZJEx4msOy-zXqSZkUU621FO7q3TrC0ml3ZKACComdBPLZ2ahw032v2/exec";

        // Toggles the start/end time and days visibility if 24/7 is checked
        function toggleTimeSettings() {
            const is247 = document.getElementById("is247").checked;
            document.getElementById("timeSettings").style.display = is247 ? "none" : "block";
        }

        // Generic function to send POST requests
        async function sendPostRequest(payload, buttonId) {
            const btn = document.getElementById(buttonId);
            const originalText = btn.innerText;
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                alert(result.message || "Success!");
            } catch (error) {
                alert("Error connecting to server. Please check console.");
                console.error(error);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // 1. Add Person
        function addPerson() {
            const name = document.getElementById("personName").value.trim();
            if(!name) return alert("Please enter a name.");
            
            sendPostRequest({ action: "addPerson", personName: name }, "btnAddPerson");
            document.getElementById("personName").value = ''; // Clear input
        }

        // 2. Add Role
        function addRole() {
            const roleName = document.getElementById("roleName").value.trim();
            const is247 = document.getElementById("is247").checked;
            const startTime = document.getElementById("startTime").value;
            const endTime = document.getElementById("endTime").value;
            
            let daysOfWeek = [];
            document.querySelectorAll('input[name="days"]:checked').forEach(cb => {
                daysOfWeek.push(cb.value);
            });

            if(!roleName) return alert("Please enter a role name.");
            if(!is247 && (!startTime || !endTime || daysOfWeek.length === 0)) {
                return alert("Please fill out time and days, or select '24/7 manning'.");
            }

            const payload = {
                action: "addRole",
                roleName: roleName,
                is247: is247,
                startTime: is247 ? "00:00" : startTime,
                endTime: is247 ? "23:59" : endTime,
                daysOfWeek: is247 ? ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"] : daysOfWeek
            };

            sendPostRequest(payload, "btnAddRole");
            
            // Clear inputs
            document.getElementById("roleName").value = '';
            document.getElementById("is247").checked = false;
            document.getElementById("startTime").value = '';
            document.getElementById("endTime").value = '';
            document.querySelectorAll('input[name="days"]:checked').forEach(cb => cb.checked = false);
            toggleTimeSettings();
        }

        // 3. Load Dropdowns for Assignment
        async function loadDropdowns() {
            const btn = document.getElementById("btnRefresh");
            btn.innerText = "Loading...";
            btn.disabled = true;

            try {
                // Fetch Personnel
                const pRes = await fetch(API_URL + "?action=getPersonnel");
                const personnel = await pRes.json();
                const personSelect = document.getElementById("personSelect");
                personSelect.innerHTML = '<option value="">-- Select Person --</option>';
                personnel.forEach(p => {
                    personSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                });

                // Fetch Roles
                const rRes = await fetch(API_URL + "?action=getRoles");
                const roles = await rRes.json();
                const roleSelect = document.getElementById("roleSelect");
                roleSelect.innerHTML = '<option value="">-- Select Role --</option>';
                roles.forEach(r => {
                    roleSelect.innerHTML += `<option value="${r.id}">${r.name}</option>`;
                });

                btn.innerText = "Dropdowns Loaded Successfully!";
                setTimeout(() => { btn.innerText = "Load / Refresh Dropdowns"; }, 3000);
            } catch (error) {
                alert("Failed to load dropdowns. Make sure you have added data first.");
                console.error(error);
                btn.innerText = "Load / Refresh Dropdowns";
            } finally {
                btn.disabled = false;
            }
        }

        // 4. Tag Person to Role
        function tagPerson() {
            const personId = document.getElementById("personSelect").value;
            const roleId = document.getElementById("roleSelect").value;

            if(!personId || !roleId) return alert("Please select both a person and a role from the dropdowns.");

            sendPostRequest({
                action: "tagPerson",
                personId: personId,
                roleId: roleId
            }, "btnAssign");
            
            // Reset dropdowns to default after assignment
            document.getElementById("personSelect").value = "";
            document.getElementById("roleSelect").value = "";
        }
    </script>
</body>
</html>
