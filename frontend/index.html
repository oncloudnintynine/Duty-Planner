<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DutyPlanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .tab-btn.active { background-color: rgba(99, 102, 241, 0.1); color: #818cf8; border-right: 3px solid #818cf8; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-indigo-500/30">

    <div id="app"></div>

    <script>
        // REPLACE WITH YOUR ACTUAL WEB APP DEPLOYMENT URL
        const API_URL = "https://script.google.com/macros/s/AKfycbzBf4TJr_ZBPLZJEx4msOy-zXqSZkUU621FO7q3TrC0ml3ZKACComdBPLZ2ahw032v2/exec";

        // ==============================================
        // FRAMEWORK / STATE MANAGER
        // ==============================================
        const UI = {
            state: {
                activeTab: 'setup',
                loading: false,
                lastMonth: '',
                searchQuery: '',
                selectedPersonId: null,
                data: { personnel: [], roles: [], shifts: [], tags: [], schedule: [] },
                toast: null
            },
            
            init() {
                this.dispatch('sync');
            },

            async dispatch(action, payload = {}) {
                this.state.loading = true;
                this.render();
                
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action, ...payload })
                    });
                    const json = await res.json();
                    
                    if (json.status === 'success') {
                        this.state.data = json.data;
                        if (json.message) this.showToast(json.message, 'success');
                        
                        // If selected person was deleted, clear selection
                        if (action === 'deletePerson' && payload.id === this.state.selectedPersonId) {
                            this.state.selectedPersonId = null;
                        }
                    } else {
                        this.showToast(json.message || "An error occurred", 'error');
                    }
                } catch (e) {
                    this.showToast("Network Error: Could not connect to database.", 'error');
                }
                
                this.state.loading = false;
                this.render();
                
                if(this.state.activeTab === 'setup') window.renderShiftInputs();
            },

            showToast(msg, type) {
                this.state.toast = { msg, type };
                this.render();
                setTimeout(() => { this.state.toast = null; this.render(); }, 3000);
            },
            
            render() {
                document.getElementById('app').innerHTML = AppTemplate(this.state);
                lucide.createIcons();
            }
        };

        // ==============================================
        // COMPONENTS
        // ==============================================
        function AppTemplate(state) {
            return `
            <div class="flex h-screen overflow-hidden">
                ${Sidebar(state)}
                <main class="flex-1 overflow-y-auto bg-zinc-950 p-8">
                    <div class="max-w-6xl mx-auto pb-12">
                        ${state.activeTab === 'setup' ? SetupView(state) : ''}
                        ${state.activeTab === 'manage' ? ManageView(state) : ''}
                        ${state.activeTab === 'roster' ? RosterView(state) : ''}
                        ${state.activeTab === 'calc' ? ManpowerCalculatorView(state) : ''}
                    </div>
                </main>
            </div>
            ${state.loading ? Loader() : ''}
            ${state.toast ? Toast(state.toast) : ''}
            `;
        }

        function Sidebar(state) {
            const tabs = [
                { id: 'setup', name: 'Topology & Setup', icon: 'database' },
                { id: 'manage', name: 'Personnel & Assignments', icon: 'users' },
                { id: 'roster', name: 'Roster Engine', icon: 'calendar-days' },
                { id: 'calc', name: 'Manpower Calculator', icon: 'calculator' }
            ];
            return `
            <aside class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col z-10 shadow-2xl">
                <div class="p-6 border-b border-zinc-800 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center border border-indigo-500/50 text-indigo-400">
                        <i data-lucide="shield-check" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white leading-tight">DutyPlanner</h1>
                    </div>
                </div>
                <nav class="flex-1 p-4 space-y-2">
                    ${tabs.map(t => `
                        <button onclick="window.switchTab('${t.id}')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all duration-200 ${state.activeTab === t.id ? 'active' : 'text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200'} border-r-2 border-transparent">
                            <i data-lucide="${t.icon}" class="w-5 h-5"></i>
                            ${t.name}
                        </button>
                    `).join('')}
                </nav>
            </aside>
            `;
        }

        function SetupView(state) {
            return `
            <div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="mb-2">
                    <h2 class="text-2xl font-bold text-white">Database Setup</h2>
                    <p class="text-zinc-400 text-sm mt-1">Configure your roles, concurrency matrix, and shift headcount requirements.</p>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-xl">
                    <h3 class="text-lg font-semibold text-white mb-5 flex items-center gap-2"><i data-lucide="briefcase" class="w-5 h-5 text-indigo-400"></i> Role & Shift Logic</h3>
                    <div class="space-y-6">
                        
                        <div class="grid grid-cols-3 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-2">Role Name</label>
                                <input type="text" id="inpRoleName" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2 text-sm outline-none focus:border-indigo-500" placeholder="e.g. Area Commander">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-2">Role Type</label>
                                <select id="inpRoleType" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2 text-sm outline-none focus:border-indigo-500">
                                    <option value="On-Site">On-Site (Requires Presence)</option>
                                    <option value="Standby">Standby (Recall Only)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-zinc-400 mb-2">Weekly Pattern</label>
                                <label class="flex items-center gap-3 bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2 cursor-pointer hover:border-zinc-700 transition-colors h-[38px]">
                                    <input type="checkbox" id="inpIs247" onchange="window.toggleDays(this.checked)" class="w-4 h-4 rounded border-zinc-700 bg-zinc-900">
                                    <span class="text-sm">Runs 24/7 (Mon-Sun)</span>
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-zinc-400 mb-3">Target Days (if not 24/7)</label>
                            <div class="flex flex-wrap gap-2">
                                ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(day => `
                                    <label class="flex items-center gap-2 bg-zinc-950 border border-zinc-800 px-4 py-2 rounded-md cursor-pointer hover:border-zinc-700">
                                        <input type="checkbox" value="${day}" class="role-day-cb w-4 h-4 rounded bg-zinc-900">
                                        <span class="text-sm font-medium text-zinc-300">${day}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>

                        ${state.data.roles.length > 0 ? `
                        <div class="p-4 bg-zinc-950/50 border border-zinc-800 rounded-lg">
                            <label class="block text-sm font-medium text-zinc-400 mb-3">Concurrency Matrix</label>
                            <p class="text-xs text-zinc-500 mb-3">Select other roles that this person can execute at the exact same time without violating the rest rules.</p>
                            <div class="flex flex-wrap gap-3">
                                ${state.data.roles.map(r => `
                                    <label class="flex items-center gap-2 bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded-md cursor-pointer hover:border-zinc-700">
                                        <input type="checkbox" value="${r.id}" class="role-concurrent-cb w-3.5 h-3.5 rounded bg-zinc-900">
                                        <span class="text-xs font-medium text-zinc-300">${r.name}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}

                        <div class="bg-zinc-950/50 rounded-lg p-5 border border-zinc-800/50 mt-6">
                            <div class="flex items-center justify-between mb-4 pb-4 border-b border-zinc-800/50">
                                <div>
                                    <label class="block text-sm font-medium text-zinc-200">Shift Topology & Headcount</label>
                                    <p class="text-xs text-zinc-500">Define shift times and exact number of personnel required per seniority.</p>
                                </div>
                                <select id="inpNumShifts" onchange="window.renderShiftInputs()" class="bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2 text-sm outline-none w-32 shadow-inner">
                                    <option value="1">1 Shift</option>
                                    <option value="2">2 Shifts</option>
                                    <option value="3">3 Shifts</option>
                                    <option value="4">4 Shifts</option>
                                </select>
                            </div>
                            <div id="shiftRowsContainer" class="space-y-3">
                                <!-- JS Injected Shifts -->
                            </div>
                        </div>

                        <div class="pt-2 flex justify-end">
                            <button onclick="window.handleAddRole()" class="bg-zinc-100 text-zinc-900 px-8 py-3 rounded-lg font-bold hover:bg-white transition-all text-sm shadow-lg shadow-zinc-200/5">Add Role to Database</button>
                        </div>
                    </div>
                </div>

                <!-- Delete Roles Table view -->
                <div class="bg-zinc-900 border border-zinc-800 rounded-xl flex flex-col shadow-xl">
                    <div class="p-4 border-b border-zinc-800 bg-zinc-950 rounded-t-xl flex justify-between items-center">
                        <h3 class="font-semibold text-zinc-300 text-sm tracking-wide uppercase">Configured Roles</h3>
                        <span class="text-xs bg-zinc-800 px-2 py-0.5 rounded text-zinc-400">${state.data.roles.length}</span>
                    </div>
                    <div class="max-h-[300px] overflow-y-auto">
                        <table class="w-full text-left text-sm text-zinc-400">
                            <tbody class="divide-y divide-zinc-800/50">
                                ${state.data.roles.map(r => `
                                <tr class="hover:bg-zinc-800/20 group transition-colors">
                                    <td class="px-5 py-3">
                                        <div class="font-medium text-zinc-200 flex items-center gap-2">
                                            ${r.name} 
                                            <span class="text-[10px] px-2 py-0.5 rounded-full ${r.type === 'Standby' ? 'bg-orange-500/20 text-orange-400 border border-orange-500/30' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'}">${r.type}</span>
                                        </div>
                                        <div class="text-xs text-zinc-500 mt-1">${r.is247 === true || r.is247 === 'TRUE' ? '24/7 (Mon-Sun)' : r.days}</div>
                                    </td>
                                    <td class="px-5 py-3 text-right">
                                        <button onclick="UI.dispatch('deleteRole', {id: '${r.id}'})" class="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-red-400 transition-all p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </td>
                                </tr>
                                `).join('') || `<tr><td colspan="2" class="px-5 py-8 text-center text-zinc-600 text-xs italic">No roles established</td></tr>`}
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
            `;
        }

        function ManageView(state) {
            // Apply Fuzzy Search Filter
            const searchQ = state.searchQuery.toLowerCase();
            const filteredPersonnel = state.data.personnel.filter(p => p.name.toLowerCase().includes(searchQ));
            
            // Get Selected Person
            const selPerson = state.data.personnel.find(p => p.id === state.selectedPersonId);
            
            return `
            <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 h-full flex flex-col">
                <div class="mb-2">
                    <h2 class="text-2xl font-bold text-white">Personnel & Assignments</h2>
                    <p class="text-zinc-400 text-sm mt-1">Manage workforce, update seniority levels, and map capabilities.</p>
                </div>

                <!-- Add Personnel Quick Bar -->
                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 flex gap-4 items-center shadow-md">
                    <div class="flex-1 flex gap-2">
                        <input type="text" id="inpNewPerson" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2 text-sm outline-none focus:border-indigo-500" placeholder="Add single person (e.g. Jane Doe)">
                        <select id="inpNewSeniority" class="bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-300">
                            <option value="Junior">Junior</option>
                            <option value="Mid">Mid</option>
                            <option value="Senior">Senior</option>
                        </select>
                        <button onclick="window.handleAddPerson()" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-indigo-500 transition-colors text-sm">Add</button>
                    </div>
                    <div class="w-px h-8 bg-zinc-800"></div>
                    <div class="flex-1 flex gap-2">
                        <input type="text" id="inpBulkPerson" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2 text-sm outline-none focus:border-indigo-500" placeholder="Bulk Import (comma separated)">
                        <button onclick="window.handleBulkImport()" class="bg-zinc-800 text-zinc-300 px-5 py-2 rounded-lg font-medium hover:bg-zinc-700 transition-colors text-sm border border-zinc-700">Import Default (Junior)</button>
                    </div>
                </div>

                <div class="flex gap-6 h-[500px]">
                    <!-- Left List: Fuzzy Search -->
                    <div class="w-1/3 bg-zinc-900 border border-zinc-800 rounded-xl flex flex-col shadow-xl">
                        <div class="p-4 border-b border-zinc-800 bg-zinc-950 rounded-t-xl">
                            <div class="relative">
                                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-zinc-500"></i>
                                <input type="text" placeholder="Search personnel..." value="${state.searchQuery}" onkeyup="UI.state.searchQuery = this.value; UI.render();" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg pl-9 pr-4 py-2 text-sm outline-none focus:border-indigo-500 text-white">
                            </div>
                        </div>
                        <div class="flex-1 overflow-y-auto hide-scroll p-2 space-y-1">
                            ${filteredPersonnel.map(p => `
                                <button onclick="UI.state.selectedPersonId = '${p.id}'; UI.render();" class="w-full text-left px-4 py-3 rounded-lg flex items-center justify-between group transition-all ${state.selectedPersonId === p.id ? 'bg-indigo-500/20 border border-indigo-500/50' : 'hover:bg-zinc-800/50 border border-transparent'}">
                                    <div>
                                        <div class="font-semibold ${state.selectedPersonId === p.id ? 'text-indigo-300' : 'text-zinc-200'}">${p.name}</div>
                                        <div class="text-[10px] tracking-widest uppercase text-zinc-500 mt-0.5">${p.seniority || 'Junior'}</div>
                                    </div>
                                    <i data-lucide="chevron-right" class="w-4 h-4 ${state.selectedPersonId === p.id ? 'text-indigo-400' : 'text-zinc-600 opacity-0 group-hover:opacity-100'}"></i>
                                </button>
                            `).join('')}
                            ${filteredPersonnel.length === 0 ? `<div class="p-6 text-center text-zinc-500 text-sm">No matches found.</div>` : ''}
                        </div>
                    </div>

                    <!-- Right Detail Panel -->
                    <div class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl shadow-xl flex flex-col relative overflow-hidden">
                        ${!selPerson ? `
                            <div class="absolute inset-0 flex flex-col items-center justify-center opacity-30 pointer-events-none">
                                <i data-lucide="user-square-2" class="w-20 h-20 mb-4 text-zinc-500"></i>
                                <p class="text-lg text-zinc-400">Select personnel to manage assignments</p>
                            </div>
                        ` : `
                            <div class="p-6 border-b border-zinc-800 bg-zinc-950 flex justify-between items-start">
                                <div>
                                    <h2 class="text-2xl font-bold text-white mb-1">${selPerson.name}</h2>
                                    <p class="text-xs text-zinc-500 font-mono">ID: ${selPerson.id.substring(0,8)}...</p>
                                </div>
                                <button onclick="UI.dispatch('deletePerson', {id: '${selPerson.id}'})" class="text-zinc-500 hover:bg-red-500/10 hover:text-red-400 px-3 py-1.5 rounded text-sm transition-colors flex items-center gap-2">
                                    <i data-lucide="trash" class="w-4 h-4"></i> Remove Employee
                                </button>
                            </div>

                            <div class="p-6 flex-1 overflow-y-auto space-y-8">
                                
                                <!-- Seniority Update -->
                                <div>
                                    <label class="block text-sm font-semibold text-zinc-300 mb-2 uppercase tracking-wider">Seniority Level</label>
                                    <div class="flex gap-3 max-w-sm">
                                        <select id="editSeniority" class="flex-1 bg-zinc-950 border border-zinc-700 rounded-lg px-4 py-2 text-sm outline-none text-white focus:border-indigo-500">
                                            <option value="Junior" ${selPerson.seniority === 'Junior' ? 'selected' : ''}>Junior</option>
                                            <option value="Mid" ${selPerson.seniority === 'Mid' ? 'selected' : ''}>Mid</option>
                                            <option value="Senior" ${selPerson.seniority === 'Senior' ? 'selected' : ''}>Senior</option>
                                        </select>
                                        <button onclick="window.handleUpdateSeniority('${selPerson.id}', '${selPerson.name}')" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-4 py-2 rounded-lg text-sm transition-colors border border-zinc-600">Update</button>
                                    </div>
                                </div>

                                <!-- Role Capability Tags -->
                                <div>
                                    <div class="flex justify-between items-end mb-3">
                                        <label class="block text-sm font-semibold text-zinc-300 uppercase tracking-wider">Authorized Roles</label>
                                    </div>
                                    <div class="bg-zinc-950/50 border border-zinc-800/50 rounded-xl p-4 min-h-[100px] flex flex-wrap gap-2 items-start content-start">
                                        ${state.data.tags.filter(t => t.personId === selPerson.id).map(t => {
                                            const role = state.data.roles.find(r => r.id === t.roleId);
                                            if(!role) return '';
                                            return `
                                            <div class="group inline-flex items-center gap-2 bg-indigo-500/10 border border-indigo-500/20 text-indigo-300 pl-3 pr-1.5 py-1.5 rounded-full text-xs font-semibold shadow-sm">
                                                ${role.name}
                                                <button onclick="UI.dispatch('deleteTag', {id: '${t.id}'})" class="w-5 h-5 rounded-full bg-indigo-500/20 hover:bg-red-500 flex items-center justify-center text-indigo-300 hover:text-white transition-colors">
                                                    <i data-lucide="x" class="w-3 h-3"></i>
                                                </button>
                                            </div>
                                            `;
                                        }).join('') || `<span class="text-zinc-600 text-sm italic w-full text-center mt-6">No roles assigned. They cannot be rostered.</span>`}
                                    </div>
                                    
                                    <div class="mt-4 flex gap-3 max-w-md">
                                        <select id="assignRoleSelect" class="flex-1 bg-zinc-950 border border-zinc-700 rounded-lg px-4 py-2 text-sm outline-none text-white focus:border-indigo-500">
                                            <option value="">-- Grant Capability --</option>
                                            ${state.data.roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
                                        </select>
                                        <button onclick="window.handleAssign('${selPerson.id}')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors">Grant</button>
                                    </div>
                                </div>
                            </div>
                        `}
                    </div>
                </div>
            </div>
            `;
        }

        function ManpowerCalculatorView(state) {
            // Calculator Engine
            const roles = state.data.roles;
            const shifts = state.data.shifts;
            const personnel = state.data.personnel;
            
            // Tally Existing Personnel
            const existingCount = { Senior: 0, Mid: 0, Junior: 0 };
            personnel.forEach(p => {
                if(p.seniority && existingCount[p.seniority] !== undefined) existingCount[p.seniority]++;
            });

            // Calculate Required Math
            // Assumed capacity based on 11h rest and 44h limit with 9.5h office blocks. 
            // Simplified safe estimate: approx 15 duty hours achievable per week per person.
            const DUTY_HOURS_PER_PERSON_PER_WEEK = 15; 
            
            let reqCounts = { Senior: 0, Mid: 0, Junior: 0 };
            let totalRoleHours = 0;

            roles.forEach(r => {
                let daysPerWeek = (r.is247 === true || r.is247 === 'TRUE') ? 7 : (r.days.split(',').filter(x=>x).length);
                let roleShifts = shifts.filter(s => s.roleId === r.id);
                
                roleShifts.forEach(s => {
                    // Calc duration
                    let st = new Date(`2000-01-01T${s.start}`);
                    let et = new Date(`2000-01-01T${s.end}`);
                    if(et <= st) et.setDate(et.getDate() + 1);
                    let hrs = (et - st) / 3600000;
                    
                    // Standby discount (50% physical toll)
                    if (r.type === 'Standby') hrs *= 0.5;

                    let shiftReqs = {};
                    try{ shiftReqs = JSON.parse(s.reqs); }catch(e){}

                    ['Senior', 'Mid', 'Junior'].forEach(lvl => {
                        let count = parseInt(shiftReqs[lvl]) || 0;
                        if(count > 0) {
                            let totalHrsPerWeek = hrs * count * daysPerWeek;
                            totalRoleHours += totalHrsPerWeek;
                            reqCounts[lvl] += (totalHrsPerWeek / DUTY_HOURS_PER_PERSON_PER_WEEK);
                        }
                    });
                });
            });

            // Ceiling requirements
            reqCounts.Senior = Math.ceil(reqCounts.Senior);
            reqCounts.Mid = Math.ceil(reqCounts.Mid);
            reqCounts.Junior = Math.ceil(reqCounts.Junior);

            return `
            <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="mb-4">
                    <h2 class="text-2xl font-bold text-white">Manpower Requirement Calculator</h2>
                    <p class="text-zinc-400 text-sm mt-1">Mathematical framework mapping shift topology to organizational hiring needs.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${['Senior', 'Mid', 'Junior'].map(lvl => {
                        const req = reqCounts[lvl];
                        const act = existingCount[lvl];
                        const diff = act - req;
                        const isDeficit = diff < 0;
                        return `
                        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-lg">
                            <h3 class="text-zinc-400 text-sm font-bold uppercase tracking-wider mb-4 flex items-center gap-2">
                                <i data-lucide="user-check" class="w-4 h-4"></i> ${lvl} Tier
                            </h3>
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <div class="text-4xl font-bold text-white">${act}</div>
                                    <div class="text-xs text-zinc-500 mt-1">Current Headcount</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-2xl font-bold text-zinc-300">${req}</div>
                                    <div class="text-xs text-zinc-500 mt-1">Required Min.</div>
                                </div>
                            </div>
                            <div class="pt-4 border-t border-zinc-800/50">
                                ${isDeficit 
                                    ? `<div class="text-red-400 font-semibold text-sm flex items-center gap-1.5"><i data-lucide="trending-down" class="w-4 h-4"></i> Deficit of ${Math.abs(diff)} personnel</div>`
                                    : `<div class="text-emerald-400 font-semibold text-sm flex items-center gap-1.5"><i data-lucide="trending-up" class="w-4 h-4"></i> Surplus of ${diff} personnel</div>`
                                }
                            </div>
                        </div>
                        `;
                    }).join('')}
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-xl mt-6">
                    <h3 class="text-lg font-semibold text-white mb-4">Algorithm Assumptions & Framework Rules</h3>
                    <div class="text-sm text-zinc-400 space-y-3 font-medium leading-relaxed">
                        <p class="flex gap-2"><i data-lucide="check-circle-2" class="w-5 h-5 text-indigo-500 shrink-0"></i> <b>Statutory Cap:</b> Personnel are strictly limited to a maximum of 44 working hours per week. This includes normal office hours.</p>
                        <p class="flex gap-2"><i data-lucide="check-circle-2" class="w-5 h-5 text-indigo-500 shrink-0"></i> <b>Base Office Hours:</b> The model assumes standard office hours are Mon-Fri, 0800 HRS to 1730 HRS (9.5 elapsed hours). </p>
                        <p class="flex gap-2"><i data-lucide="check-circle-2" class="w-5 h-5 text-indigo-500 shrink-0"></i> <b>Rest Intervals (11-Hour Rule):</b> A strict 11-hour rest block is mandated between shifts. If a rostered duty violates this rest block against an office day, the model automatically waives the office day (Off-In-Lieu) to preserve the rest rule, recovering hours for duty capacity.</p>
                        <p class="flex gap-2"><i data-lucide="check-circle-2" class="w-5 h-5 text-indigo-500 shrink-0"></i> <b>Standby Depreciation:</b> Standby roles do not require physical presence and are calculated at a 50% physical toll index (1 hr shift = 0.5 hr working limit consumption).</p>
                        <p class="flex gap-2"><i data-lucide="check-circle-2" class="w-5 h-5 text-indigo-500 shrink-0"></i> <b>Net Duty Capacity:</b> Factoring in standard breaks, leaves, and OILs, the algorithm estimates a safe usable capacity of <b>15 duty-hours per person per week</b> beyond standard operations.</p>
                    </div>
                </div>
            </div>
            `;
        }

        function RosterView(state) {
            const ym = document.getElementById('inpMonth')?.value || state.lastMonth || "";
            let scheduleRows = [];
            if(ym) {
                scheduleRows = state.data.schedule.filter(s => String(s.yearMonth).startsWith(ym));
            }

            const formatTime = (isoString) => {
               try { 
                  const d = new Date(isoString); 
                  if(!isNaN(d)) return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false}); 
               } catch(e) {}
               return isoString;
            };

            const formatDate = (isoString) => {
               try { 
                  const d = new Date(isoString); 
                  if(!isNaN(d)) return d.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'}); 
               } catch(e) {}
               return isoString;
            };

            return `
            <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="mb-4">
                    <h2 class="text-2xl font-bold text-white">Heuristic Roster Engine</h2>
                    <p class="text-zinc-400 text-sm mt-1 flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4 text-indigo-400"></i> Engine enforces strict 11-hour rest periods, 44hr weekly limits, and OIL waivers.
                    </p>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-xl flex items-end gap-6">
                    <div class="flex-1 max-w-sm">
                        <label class="block text-sm font-medium text-zinc-400 mb-2">Target Month / Year</label>
                        <input type="month" id="inpMonth" value="${ym}" onchange="UI.state.lastMonth = this.value; UI.render();" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 outline-none focus:border-indigo-500 text-sm transition-colors text-white">
                    </div>
                    <button onclick="window.handleGenerate()" class="bg-white text-black px-6 py-2.5 rounded-lg font-bold hover:bg-zinc-200 transition-colors shadow flex items-center gap-2">
                        <i data-lucide="cpu" class="w-4 h-4"></i> Execute Engine
                    </button>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden shadow-xl">
                    <div class="overflow-x-auto max-h-[600px] relative">
                        <table class="w-full text-left text-sm text-zinc-300 whitespace-nowrap">
                            <thead class="bg-zinc-950 text-zinc-400 text-xs uppercase sticky top-0 z-10 border-b border-zinc-800">
                                <tr>
                                    <th class="px-6 py-4 font-semibold tracking-wider">Date</th>
                                    <th class="px-6 py-4 font-semibold tracking-wider">Role & Shift Node</th>
                                    <th class="px-6 py-4 font-semibold tracking-wider">Seniority Req</th>
                                    <th class="px-6 py-4 font-semibold tracking-wider">Time Window</th>
                                    <th class="px-6 py-4 font-semibold tracking-wider text-right">Assigned Personnel</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-zinc-800/50">
                                ${scheduleRows.length > 0 ? scheduleRows.map((s, i) => `
                                <tr class="hover:bg-zinc-800/30 transition-colors ${i % 2 === 0 ? 'bg-zinc-900/10' : ''}">
                                    <td class="px-6 py-3.5 font-medium text-zinc-300">${formatDate(s.date)}</td>
                                    <td class="px-6 py-3.5 text-zinc-400">
                                        <div class="font-medium text-zinc-200">${s.role}</div>
                                        <div class="text-xs text-zinc-500">${s.shift}</div>
                                    </td>
                                    <td class="px-6 py-3.5">
                                        <span class="bg-zinc-800 text-zinc-300 border border-zinc-700 px-2 py-0.5 rounded text-[10px] uppercase tracking-widest font-bold">${s.seniorityReq || 'Any'}</span>
                                    </td>
                                    <td class="px-6 py-3.5 text-xs font-mono text-zinc-400">
                                        ${formatTime(s.start)} - ${formatTime(s.end)}
                                    </td>
                                    <td class="px-6 py-3.5 text-right">
                                        ${s.personName === 'UNFILLED' 
                                            ? `<span class="inline-flex items-center gap-1.5 bg-red-500/10 text-red-400 border border-red-500/20 px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wide"><i data-lucide="alert-triangle" class="w-3 h-3"></i> Unfilled</span>`
                                            : `<span class="font-semibold text-zinc-200">${s.personName}</span>`
                                        }
                                    </td>
                                </tr>
                                `).join('') : `
                                <tr><td colspan="5" class="px-6 py-20 text-center text-zinc-500">
                                    <div class="flex flex-col items-center justify-center opacity-40">
                                        <i data-lucide="calendar-x" class="w-16 h-16 mb-4"></i>
                                        <p class="text-lg">${ym ? "Engine has not generated data for this timeframe." : "Select a valid timeframe to inspect data."}</p>
                                    </div>
                                </td></tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            `;
        }

        function Loader() {
            return `
            <div class="fixed inset-0 bg-zinc-950/80 backdrop-blur z-50 flex flex-col items-center justify-center animate-in fade-in duration-200">
                <div class="w-12 h-12 border-4 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin mb-4 shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
                <p class="text-indigo-300 font-semibold tracking-widest text-sm uppercase animate-pulse">Syncing Database...</p>
            </div>
            `;
        }

        function Toast(toast) {
            const isErr = toast.type === 'error';
            return `
            <div class="fixed bottom-8 right-8 z-50 animate-in slide-in-from-bottom-8 fade-in duration-300">
                <div class="${isErr ? 'bg-red-500 text-white' : 'bg-white text-zinc-900'} px-5 py-3.5 rounded-xl shadow-2xl font-semibold text-sm flex items-center gap-3 border ${isErr ? 'border-red-400' : 'border-zinc-200'}">
                    <i data-lucide="${isErr ? 'alert-octagon' : 'check-circle'}" class="w-5 h-5 ${isErr ? 'text-white' : 'text-green-500'}"></i>
                    ${toast.msg}
                </div>
            </div>
            `;
        }

        // ==============================================
        // ACTION HANDLERS (Bound to Window)
        // ==============================================
        window.switchTab = (tab) => { 
            UI.state.activeTab = tab; 
            UI.render(); 
        };

        window.handleAddPerson = () => {
            const val = document.getElementById('inpNewPerson').value.trim();
            const seniority = document.getElementById('inpNewSeniority').value;
            if(val) UI.dispatch('addPerson', { personName: val, seniority: seniority });
        };

        window.handleUpdateSeniority = (id, name) => {
            const seniority = document.getElementById('editSeniority').value;
            UI.dispatch('updatePerson', { id, personName: name, seniority });
        };

        window.handleBulkImport = () => {
            const val = document.getElementById('inpBulkPerson').value;
            const names = val.split(/\r?\n|,/).map(n=>n.trim()).filter(n=>n);
            if(names.length > 0) UI.dispatch('importPersonnel', { names });
        };

        window.toggleDays = (isChecked) => {
            document.querySelectorAll('.role-day-cb').forEach(cb => {
                cb.checked = isChecked;
                cb.disabled = isChecked;
            });
        };

        window.renderShiftInputs = () => {
            const num = parseInt(document.getElementById('inpNumShifts').value) || 1;
            let html = '';
            for(let i=1; i<=num; i++) {
                html += `
                <div class="bg-zinc-900 p-4 rounded-lg border border-zinc-800 space-y-4">
                    <div class="flex gap-4 items-center">
                        <div class="flex-1">
                            <label class="block text-[10px] font-bold text-zinc-500 mb-1.5 uppercase tracking-widest">Shift Node Identifier</label>
                            <input type="text" id="sName_${i}" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm outline-none focus:border-indigo-500" value="Shift ${i}">
                        </div>
                        <div class="w-32">
                            <label class="block text-[10px] font-bold text-zinc-500 mb-1.5 uppercase tracking-widest">Start Time</label>
                            <input type="time" id="sStart_${i}" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm outline-none focus:border-indigo-500 text-zinc-300">
                        </div>
                        <div class="w-32">
                            <label class="block text-[10px] font-bold text-zinc-500 mb-1.5 uppercase tracking-widest">End Time</label>
                            <input type="time" id="sEnd_${i}" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm outline-none focus:border-indigo-500 text-zinc-300">
                        </div>
                    </div>
                    
                    <div class="border-t border-zinc-800/50 pt-3">
                        <label class="block text-[10px] font-bold text-zinc-500 mb-2 uppercase tracking-widest">Required Headcount Per Seniority (Zero means none needed)</label>
                        <div class="flex gap-4">
                            <div class="flex items-center gap-2 bg-zinc-950 border border-zinc-800 px-3 py-1.5 rounded-md">
                                <span class="text-xs text-zinc-400 font-semibold w-12">Senior</span>
                                <input type="number" id="sReqSenior_${i}" value="0" min="0" class="w-12 bg-transparent text-white text-sm outline-none text-center">
                            </div>
                            <div class="flex items-center gap-2 bg-zinc-950 border border-zinc-800 px-3 py-1.5 rounded-md">
                                <span class="text-xs text-zinc-400 font-semibold w-12">Mid</span>
                                <input type="number" id="sReqMid_${i}" value="0" min="0" class="w-12 bg-transparent text-white text-sm outline-none text-center">
                            </div>
                            <div class="flex items-center gap-2 bg-zinc-950 border border-zinc-800 px-3 py-1.5 rounded-md">
                                <span class="text-xs text-zinc-400 font-semibold w-12">Junior</span>
                                <input type="number" id="sReqJunior_${i}" value="1" min="0" class="w-12 bg-transparent text-white text-sm outline-none text-center">
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }
            const container = document.getElementById('shiftRowsContainer');
            if(container) container.innerHTML = html;
        };

        window.handleAddRole = () => {
            const roleName = document.getElementById('inpRoleName').value.trim();
            const roleType = document.getElementById('inpRoleType').value;
            const is247 = document.getElementById('inpIs247').checked;
            
            const days = [];
            if (is247) {
                ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => days.push(d));
            } else {
                document.querySelectorAll('.role-day-cb:checked').forEach(cb => days.push(cb.value));
            }

            const concurrentRoles = [];
            document.querySelectorAll('.role-concurrent-cb:checked').forEach(cb => concurrentRoles.push(cb.value));
            
            const num = parseInt(document.getElementById('inpNumShifts').value) || 1;
            const shifts = [];
            for(let i=1; i<=num; i++) {
                const sn = document.getElementById(`sName_${i}`).value.trim();
                const st = document.getElementById(`sStart_${i}`).value;
                const se = document.getElementById(`sEnd_${i}`).value;
                
                const rSen = parseInt(document.getElementById(`sReqSenior_${i}`).value) || 0;
                const rMid = parseInt(document.getElementById(`sReqMid_${i}`).value) || 0;
                const rJun = parseInt(document.getElementById(`sReqJunior_${i}`).value) || 0;

                if(!sn || !st || !se) return UI.showToast("Missing parameters in shift inputs.", "error");
                
                shifts.push({ 
                    name: sn, 
                    start: st, 
                    end: se,
                    reqs: { Senior: rSen, Mid: rMid, Junior: rJun }
                });
            }

            if(!roleName) return UI.showToast("Role name is required.", "error");
            if(days.length === 0) return UI.showToast("Select at least one day constraint.", "error");

            UI.dispatch('addRole', { roleName, roleType, is247, daysOfWeek: days, concurrentRoles, shifts });
        };

        window.handleAssign = (personId) => {
            const roleId = document.getElementById('assignRoleSelect').value;
            if(!roleId) return UI.showToast("Select a role to grant.", "error");
            UI.dispatch('tagPerson', { personId, roleId });
        };

        window.handleGenerate = () => {
            const ym = document.getElementById('inpMonth').value;
            if(!ym) return UI.showToast("Select a valid month to execute engine.", "error");
            const [year, month] = ym.split('-');
            
            if(UI.state.data.roles.length === 0 || UI.state.data.personnel.length === 0) {
                return UI.showToast("Engine halted: Missing personnel or roles.", "error");
            }
            
            UI.dispatch('generateSchedule', { year: parseInt(year), month: parseInt(month) });
        };

        // Bootstrap App
        window.onload = () => UI.init();

    </script>
</body>
</html>
