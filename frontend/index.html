<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Duty Roster Planner</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 850px; margin: 0 auto; background: #f4f7f6; color: #333;}
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;}
        h2 { margin-top: 0; color: #444; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="text"], input[type="time"], input[type="number"], select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;}
        .checkbox-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 5px; }
        .checkbox-group label { display: flex; align-items: center; font-weight: normal; }
        .checkbox-group input { margin-right: 5px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s;}
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-success { background: #28a745; margin-bottom: 15px; }
        .btn-success:hover { background: #218838; }
        
        /* Shift Input Styles */
        .shift-container { background: #f9f9f9; padding: 15px; border-radius: 4px; border: 1px solid #ddd; margin-top: 15px;}
        .shift-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .shift-row input[type="text"] { flex: 1.5; }
        .shift-row input[type="time"] { flex: 1; }
        .duration-badge { flex: 0.8; font-size: 14px; background: #e2e3e5; padding: 10px; border-radius: 4px; text-align: center; font-weight: bold;}
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #222;">Duty Roster Planner</h1>

    <!-- 1. Add Personnel Section -->
    <div class="card">
        <h2>1. Add Personnel</h2>
        <div class="form-group">
            <label for="personName">Full Name</label>
            <input type="text" id="personName" placeholder="Enter personnel's full name">
        </div>
        <button id="btnAddPerson" onclick="addPerson()">Add Person</button>
    </div>

    <!-- 2. Add Role Section -->
    <div class="card">
        <h2>2. Add Role & Shifts</h2>
        <div class="form-group">
            <label for="roleName">Role Name</label>
            <input type="text" id="roleName" placeholder="e.g., Security Guard, IT Support">
        </div>
        
        <div class="form-group">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="is247" onchange="toggle247()" style="width: auto; margin-right: 10px; transform: scale(1.2);"> 
                This role requires 24/7 manning
            </label>
        </div>

        <div class="form-group">
            <label>Days of the Week Required</label>
            <div class="checkbox-group" id="daysGroup">
                <label><input type="checkbox" name="days" value="Mon"> Mon</label>
                <label><input type="checkbox" name="days" value="Tue"> Tue</label>
                <label><input type="checkbox" name="days" value="Wed"> Wed</label>
                <label><input type="checkbox" name="days" value="Thu"> Thu</label>
                <label><input type="checkbox" name="days" value="Fri"> Fri</label>
                <label><input type="checkbox" name="days" value="Sat"> Sat</label>
                <label><input type="checkbox" name="days" value="Sun"> Sun</label>
            </div>
        </div>

        <div class="shift-container">
            <div class="form-group">
                <label for="numShifts">Number of Shifts per Day</label>
                <input type="number" id="numShifts" min="1" max="10" value="1" onchange="renderShiftInputs()">
            </div>
            
            <label>Shift Timings (Adjust to create overlaps for handovers)</label>
            <div id="shiftRows">
                <!-- Shift rows injected here by JS -->
            </div>
        </div>

        <button id="btnAddRole" onclick="addRole()" style="margin-top:15px;">Add Role</button>
    </div>

    <!-- 3. Tag Personnel to Roles Section -->
    <div class="card">
        <h2>3. Assign Personnel to Roles</h2>
        <button id="btnRefresh" class="btn-success" onclick="loadDropdowns()">Load / Refresh Dropdowns</button>
        <div class="form-group">
            <label for="personSelect">Select Personnel</label>
            <select id="personSelect"><option value="">-- Please load dropdowns first --</option></select>
        </div>
        <div class="form-group">
            <label for="roleSelect">Select Role</label>
            <select id="roleSelect"><option value="">-- Please load dropdowns first --</option></select>
        </div>
        <button id="btnAssign" onclick="tagPerson()">Assign Role</button>
    </div>

    <script>
        // Your existing App Script Web App URL
        const API_URL = "https://script.google.com/macros/s/AKfycbzBf4TJr_ZBPLZJEx4msOy-zXqSZkUU621FO7q3TrC0ml3ZKACComdBPLZ2ahw032v2/exec";

        // Initialize shift inputs on load
        window.onload = () => renderShiftInputs();

        // Toggles 24/7 setting (locks days to Mon-Sun)
        function toggle247() {
            const is247 = document.getElementById("is247").checked;
            const checkboxes = document.querySelectorAll('input[name="days"]');
            checkboxes.forEach(cb => {
                if(is247) {
                    cb.checked = true;
                    cb.disabled = true;
                } else {
                    cb.checked = false;
                    cb.disabled = false;
                }
            });
        }

        // Generates dynamic shift input rows
        function renderShiftInputs() {
            const numShifts = parseInt(document.getElementById("numShifts").value) || 1;
            const container = document.getElementById("shiftRows");
            container.innerHTML = "";

            for(let i = 1; i <= numShifts; i++) {
                container.innerHTML += `
                    <div class="shift-row">
                        <input type="text" id="shiftName_${i}" value="Shift ${i}" placeholder="Shift Name">
                        <input type="time" id="shiftStart_${i}" onchange="calculateDuration(${i})">
                        <input type="time" id="shiftEnd_${i}" onchange="calculateDuration(${i})">
                        <div id="duration_${i}" class="duration-badge">0h 0m</div>
                    </div>
                `;
            }
        }

        // Calculates shift duration (handles overnight shifts past midnight automatically)
        function calculateDuration(index) {
            const start = document.getElementById(`shiftStart_${index}`).value;
            const end = document.getElementById(`shiftEnd_${index}`).value;
            const durationDisplay = document.getElementById(`duration_${index}`);

            if(!start || !end) {
                durationDisplay.innerText = "0h 0m";
                return;
            }

            let [sH, sM] = start.split(':').map(Number);
            let [eH, eM] = end.split(':').map(Number);
            
            let startMins = (sH * 60) + sM;
            let endMins = (eH * 60) + eM;

            // If end time is less than start time, it means the shift crossed midnight into the next day
            if(endMins < startMins) {
                endMins += (24 * 60); 
            }

            let diffMins = endMins - startMins;
            let hrs = Math.floor(diffMins / 60);
            let mins = diffMins % 60;

            durationDisplay.innerText = `${hrs}h ${mins}m`;
        }

        // Generic function to send POST requests
        async function sendPostRequest(payload, buttonId) {
            const btn = document.getElementById(buttonId);
            const originalText = btn.innerText;
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                alert(result.message || "Success!");
            } catch (error) {
                alert("Error connecting to server. Please check console.");
                console.error(error);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // 1. Add Person
        function addPerson() {
            const name = document.getElementById("personName").value.trim();
            if(!name) return alert("Please enter a name.");
            sendPostRequest({ action: "addPerson", personName: name }, "btnAddPerson");
            document.getElementById("personName").value = ''; 
        }

        // 2. Add Role & Shifts
        function addRole() {
            const roleName = document.getElementById("roleName").value.trim();
            const is247 = document.getElementById("is247").checked;
            const numShifts = parseInt(document.getElementById("numShifts").value) || 1;
            
            // Get Days
            let daysOfWeek = [];
            document.querySelectorAll('input[name="days"]:checked').forEach(cb => daysOfWeek.push(cb.value));

            if(!roleName) return alert("Please enter a role name.");
            if(daysOfWeek.length === 0) return alert("Please select at least one day of the week.");

            // Gather all shifts
            let shiftsData = [];
            for(let i = 1; i <= numShifts; i++) {
                const name = document.getElementById(`shiftName_${i}`).value;
                const start = document.getElementById(`shiftStart_${i}`).value;
                const end = document.getElementById(`shiftEnd_${i}`).value;
                const duration = document.getElementById(`duration_${i}`).innerText;

                if(!start || !end) return alert(`Please enter start and end times for Shift ${i}.`);
                
                shiftsData.push({ name, start, end, duration });
            }

            const payload = {
                action: "addRole",
                roleName: roleName,
                is247: is247,
                daysOfWeek: daysOfWeek,
                shifts: shiftsData
            };

            sendPostRequest(payload, "btnAddRole").then(() => {
                // Clear UI
                document.getElementById("roleName").value = '';
                document.getElementById("is247").checked = false;
                document.getElementById("numShifts").value = 1;
                toggle247();
                renderShiftInputs();
            });
        }

        // 3. Load Dropdowns for Assignment
        async function loadDropdowns() {
            const btn = document.getElementById("btnRefresh");
            btn.innerText = "Loading...";
            btn.disabled = true;

            try {
                const pRes = await fetch(API_URL + "?action=getPersonnel");
                const personnel = await pRes.json();
                const personSelect = document.getElementById("personSelect");
                personSelect.innerHTML = '<option value="">-- Select Person --</option>';
                personnel.forEach(p => personSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`);

                const rRes = await fetch(API_URL + "?action=getRoles");
                const roles = await rRes.json();
                const roleSelect = document.getElementById("roleSelect");
                roleSelect.innerHTML = '<option value="">-- Select Role --</option>';
                roles.forEach(r => roleSelect.innerHTML += `<option value="${r.id}">${r.name}</option>`);

                btn.innerText = "Dropdowns Loaded Successfully!";
                setTimeout(() => { btn.innerText = "Load / Refresh Dropdowns"; }, 3000);
            } catch (error) {
                alert("Failed to load dropdowns.");
                console.error(error);
                btn.innerText = "Load / Refresh Dropdowns";
            } finally {
                btn.disabled = false;
            }
        }

        // 4. Tag Person to Role
        function tagPerson() {
            const personId = document.getElementById("personSelect").value;
            const roleId = document.getElementById("roleSelect").value;
            if(!personId || !roleId) return alert("Please select both a person and a role.");

            sendPostRequest({ action: "tagPerson", personId: personId, roleId: roleId }, "btnAssign");
            
            document.getElementById("personSelect").value = "";
            document.getElementById("roleSelect").value = "";
        }
    </script>
</body>
</html>
