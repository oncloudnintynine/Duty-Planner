<!DOCTYPE html>
<html lang="en" class="dark">
<head>
 <meta charset="UTF-8">
 <!-- Strict Viewport to prevent iOS zooming, enforce mobile-first scaling, and adapt to device perfectly -->
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
 <meta name="theme-color" content="#18181b">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
 <title>DutyPlanner</title>
 <link rel="manifest" href="./manifest.json">
 
 <script src="https://cdn.tailwindcss.com"></script>
 <script src="https://unpkg.com/lucide@latest"></script>
 <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-indigo-500/30">

 <div id="app"></div>

 <!-- Application Modules -->
 <script src="./js/config.js"></script>
 <script src="./js/api.js"></script>
 <script src="./js/store.js"></script>
 <script src="./js/components/shared.js"></script>
 <script src="./js/views/setup.js"></script>
 <script src="./js/views/manage.js"></script>
 <script src="./js/views/roster.js"></script>
 <script src="./js/views/calculator.js"></script>
 <script src="./js/views/settings.js"></script>
 <script src="./js/app.js"></script>

 <script>
     // Service Worker Registration for PWA
     if ('serviceWorker' in navigator) {
         window.addEventListener('load', () => {
             navigator.serviceWorker.register('./sw.js').catch(err => {
                 console.log('ServiceWorker registration failed: ', err);
             });
         });
     }
 </script>
</body>
</html>
